user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

# 优化事件处理
events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式（添加更多诊断信息）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    reset_timedout_connection on;
    
    # 缓冲区优化
    client_body_buffer_size 128k;
    client_max_body_size 100M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;
    
    # 隐藏版本号
    server_tokens off;

    # WebSocket 代理配置
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # 上游服务器（添加健康检查和 keepalive）
    upstream cockpit {
        server 127.0.0.1:9090 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream portainer {
        server 127.0.0.1:9000 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream gitea {
        server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream convex {
        server 127.0.0.1:3210 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # HTTP 服务器
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # 安全 Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 错误页面
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 502 '{"error": "Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }

        # Portainer API 认证端点（特殊处理）
        location = /w9deployment/api/auth {
            # 通用 Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # 清除 Cookie（认证端点特殊需求）
            proxy_set_header Cookie "";
            
            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 转发到后端真实路径（去掉 /w9deployment 前缀）
            proxy_pass http://portainer/api/auth$is_args$args;
        }

        # Portainer 代理 (w9deployment)
        location /w9deployment/ {
            # 通用 Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header Origin $scheme://$host;
            proxy_set_header Accept-Encoding "";
            
            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # CORS Headers
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
            
            proxy_pass http://portainer/;
        }

        # Gitea 代理 (w9git)
        location /w9git/ {
            # 通用 Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # WebSocket 支持 (Git push/pull)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 超时配置（Git 操作可能较慢）
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            # CORS Headers
            proxy_hide_header X-Frame-Options;
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-xsrf-token' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
            
            proxy_pass http://gitea/;
        }

        # Convex BaaS API 代理 (baas)
        location /baas/ {
            # 通用 Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # 超时配置（API 可能有长时间操作）
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # WebSocket 支持（Convex 实时订阅）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_pass http://convex/;
        }

        # Media 静态文件（直接提供，性能最优）
        location /w9media/ {
            alias /websoft9/runtime/media/;
            autoindex off;
            
            # 缓存配置
            expires 7d;
            add_header Cache-Control "public, immutable";
            
            # 安全配置
            add_header X-Content-Type-Options "nosniff" always;
            
            # 尝试文件，找不到返回 404
            try_files $uri =404;
            
            # 日志优化
            access_log off;
        }

        # Cockpit WebSocket 代理（用于 cockpit.js）
        location /cockpit/ {
            # 通用 Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # WebSocket 支持（Cockpit 必需）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 超时配置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Cockpit 特定配置
            proxy_buffering off;
            gzip off;
            
            proxy_pass http://cockpit;
        }

        # Dashboard 静态文件（默认路径）
        location / {
            root /usr/share/nginx/html/dashboard;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
        
        # 健康检查端点（移到底部避免被覆盖）
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # 为未来扩展预留配置目录
    include /etc/nginx/conf.d/*.conf;
}
