<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=20260509c" />
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=20260509c" />
  <link rel="apple-touch-icon" href="/websoft9.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Websoft9 Console</title>
  <style>
    @font-face {
      font-family: 'Nunito';
      src: url('/Nunito-Regular.eot');
      src: url('/Nunito-Regular.eot?#iefix') format('embedded-opentype'),
        url('/Nunito-Regular.woff') format('woff'),
        url('/Nunito-Regular.ttf') format('truetype'),
        url('/Nunito-Regular.svg#Nunito-Regular') format('svg');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Nunito';
      src: url('/Nunito-Bold.eot');
      src: url('/Nunito-Bold.eot?#iefix') format('embedded-opentype'),
        url('/Nunito-Bold.woff') format('woff'),
        url('/Nunito-Bold.ttf') format('truetype'),
        url('/Nunito-Bold.svg#Nunito-Bold') format('svg');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'dripicons-v2';
      src: url('/dripicons-v2.eot');
      src: url('/dripicons-v2.eot?#iefix') format('embedded-opentype'),
        url('/dripicons-v2.woff') format('woff'),
        url('/dripicons-v2.ttf') format('truetype'),
        url('/dripicons-v2.svg#dripicons-v2') format('svg');
      font-weight: normal;
      font-style: normal;
    }

    [class^="dripicons-"]:before,
    [class*=" dripicons-"]:before {
      font-family: 'dripicons-v2' !important;
      font-style: normal !important;
      font-weight: normal !important;
      font-variant: normal !important;
      text-transform: none !important;
      speak: none;
      line-height: 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      vertical-align: middle;
      display: inline-block;
    }

    .dripicons-media-play:before {
      content: "\e01a";
    }

    .dripicons-power:before {
      content: "\e036";
    }

    .dripicons-clockwise:before {
      content: "\5a";
    }

    .dripicons-cutlery:before {
      content: "\22";
    }

    .dripicons-document:before {
      content: "\28";
    }

    .dripicons-document-remove:before {
      content: "\2c";
    }

    .dripicons-graph-bar:before {
      content: "\e000";
    }

    .dripicons-code:before {
      content: "\33";
    }

    .dripicons-cross:before {
      content: "\39";
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
