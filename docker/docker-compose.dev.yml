# Development docker-compose.yml — local build + single-container runtime
# Usage: docker compose -f docker-compose.dev.yml up -d --build

name: websoft9-dev

services:
  product:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        WEBSOFT9_APPSTORE_CHANNEL: dev
    image: websoft9dev/websoft9:dev
    container_name: ${CONTAINER_NAME:-websoft9-dev}
    restart: unless-stopped
    environment:
      WEBSOFT9_DATA_ROOT: ${WEBSOFT9_DATA_ROOT:-/opt/websoft9/data}
      WEBSOFT9_PLATFORM_HTTP_PORT: ${CONSOLE_PORT:-9000}
    ports:
      - "${CONSOLE_PORT:-9000}:9000"
      - "80:80"
      - "443:443"
    volumes:
      - ${WEBSOFT9_DATA_ROOT:-/opt/websoft9/data}:${WEBSOFT9_DATA_ROOT:-/opt/websoft9/data}
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "owner=websoft9"
      - "com.docker.compose.w9_http.port=9000"
    networks:
      - websoft9

networks:
  websoft9:
    external: true
    name: websoft9
