# Development docker-compose.yml — standalone local build runtime
# Usage: docker compose -f docker-compose.dev.yml up -d --build

services:
  product:
    image: websoft9dev/websoft9:dev
    container_name: websoft9-dev
    restart: unless-stopped
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        WEBSOFT9_APPSTORE_CHANNEL: dev
    environment:
      WEBSOFT9_FILES_AGENT_ALLOWED_ROOTS: ${WEBSOFT9_DOCKER_VOLUMES_ROOT:-/var/lib/docker/volumes}
    ports:
      - "${CONSOLE_PORT:-9000}:9000"
      - "80:80"
      - "443:443"
    volumes:
      - websoft9_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WEBSOFT9_DOCKER_VOLUMES_ROOT:-/var/lib/docker/volumes}:${WEBSOFT9_DOCKER_VOLUMES_ROOT:-/var/lib/docker/volumes}
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "owner=websoft9"
      - "com.docker.compose.w9_http.port=9000"
    networks:
      - websoft9

volumes:
  websoft9_data:

networks:
  websoft9:
    name: ${NETWORK_NAME:-websoft9}
    driver: bridge
