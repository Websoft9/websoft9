# Development docker-compose override — adds build: for local development
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  product:
    image: websoft9dev/websoft9:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        WEBSOFT9_PRODUCT_VERSION: ${WEBSOFT9_PRODUCT_VERSION:-2.2.25}
        WEBSOFT9_PRODUCT_EDITION_KEY: ${WEBSOFT9_PRODUCT_EDITION_KEY:-free}
        WEBSOFT9_APPSTORE_CHANNEL: ${WEBSOFT9_APPSTORE_CHANNEL:-dev}
    environment:
      - WEBSOFT9_RUNTIME_ASSET_CHANNEL=dev
    networks:
      - websoft9

networks:
  websoft9:
    name: ${NETWORK_NAME:-websoft9}
    external: true
