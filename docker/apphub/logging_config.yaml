version: 1
disable_existing_loggers: False
formatters:
  default:
    format: "%(asctime)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  platform_runtime_json:
    (): utils.runtime_logging.PlatformRuntimeJsonFormatter
filters:
  ignore_specific_requests:
    (): utils.log_filters.IgnoreSpecificRequestsFilter
handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout
    filters: [ignore_specific_requests]
  platform_runtime:
    class: utils.runtime_logging.PlatformRuntimeFileHandler
    formatter: platform_runtime_json
    filename: /opt/websoft9/data/logs/platform-runtime.log
    filters: [ignore_specific_requests]
loggers:
  uvicorn:
    level: INFO
    handlers: [console, platform_runtime]
    propagate: False
  uvicorn.error:
    level: INFO
    handlers: [console, platform_runtime]
    propagate: False
  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: False
root:
  level: INFO
  handlers: [console, platform_runtime]
