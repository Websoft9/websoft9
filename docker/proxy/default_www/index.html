<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Websoft9</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box
        }

        :root {
            --blue: #1767d1;
            --blue-dark: #1254b0;
            --ink: #0f172a;
            --muted: #64748b;
            --subtle: #94a3b8;
            --line: rgba(148, 163, 184, .16);
            --surface: #fff;
            --ground: #f8fafc;
            --green: #138a58;
            --green-soft: rgba(19, 138, 88, .1);
            --red: #c33e36;
            --red-soft: rgba(195, 62, 54, .1)
        }

        html,
        body {
            height: 100%;
            margin: 0
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--ground);
            color: var(--ink);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased
        }

        .wrapper {
            width: min(100%, 1120px);
            display: flex;
            flex-direction: column;
            align-items: center
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px
        }

        .language-switch {
            display: inline-flex;
            align-items: center;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 4px;
            overflow: hidden
        }

        .language-switch button {
            appearance: none;
            border: 0;
            background: transparent;
            padding: 4px 14px;
            color: var(--subtle);
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            line-height: 1.6;
            transition: background .15s, color .15s
        }

        .language-switch button.active {
            background: var(--blue);
            color: #fff
        }

        .language-switch button:not(.active):hover {
            color: var(--blue)
        }

        .card {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 4px;
            border-top: 3px solid var(--blue);
            box-shadow: 0 1px 3px rgba(15, 23, 42, .06), 0 20px 60px rgba(15, 23, 42, .07);
            padding: 48px 56px;
            text-align: center
        }

        .card h1 {
            font-size: 34px;
            line-height: 1.12;
            font-weight: 700;
            margin: 0 0 16px;
            letter-spacing: -.03em
        }

        .card .desc {
            font-size: 15px;
            line-height: 1.8;
            color: var(--muted);
            margin: 0 0 24px
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
            margin-bottom: 0
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 0 24px;
            border: 1px solid transparent;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            line-height: 1;
            transition: background-color .16s, border-color .16s, color .16s
        }

        .button svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0
        }

        .primary {
            background: var(--blue);
            color: #fff
        }

        .primary:hover {
            background: var(--blue-dark)
        }

        .primary.disabled {
            pointer-events: none;
            opacity: .42
        }

        .secondary {
            border-color: var(--line);
            background: var(--surface);
            color: var(--ink)
        }

        .secondary:hover {
            border-color: #b9c6d7;
            background: #f8fafc
        }

        .hint-box {
            display: none;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            background: var(--ground);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 18px 22px;
            margin-bottom: 28px;
            width: 100%;
            max-width: 620px
        }

        .hint-box.visible {
            display: inline-flex
        }

        .hint-box .hint-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6
        }

        .hint-box .hint-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--blue);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px
        }

        .status-bar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 8px 20px;
            border-radius: 4px;
            border: 1px solid var(--line);
            background: var(--surface);
            margin-bottom: 24px
        }

        .status-bar .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0
        }

        .status-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .status-icon.ok {
            background: var(--green-soft);
            color: var(--green)
        }

        .status-icon.err {
            background: var(--red-soft);
            color: var(--red)
        }

        .status-icon svg {
            width: 16px;
            height: 16px
        }

        .status-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0
        }

        .status-info .status-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.3
        }

        .status-info .status-detail {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0
        }

        .status-badge.ok {
            background: var(--green-soft);
            color: var(--green)
        }

        .status-badge.err {
            background: var(--red-soft);
            color: var(--red)
        }

        .status-badge .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%
        }

        .status-badge.ok .badge-dot {
            background: var(--green)
        }

        .status-badge.err .badge-dot {
            background: var(--red)
        }

        .retry-link {
            font-size: 12px;
            font-weight: 700;
            color: var(--blue);
            cursor: pointer;
            background: none;
            border: 0;
            padding: 0;
            text-decoration: none;
            flex-shrink: 0
        }

        .retry-link:hover {
            text-decoration: underline
        }

        .brand-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 24px;
            text-decoration: none;
            opacity: .45;
            transition: opacity .2s
        }

        .brand-footer:hover {
            opacity: .85
        }

        .brand-footer img {
            height: 36px;
            object-fit: contain
        }

        @media(max-width:700px) {
            body {
                padding: 16px
            }

            .card {
                padding: 32px 24px
            }

            .card h1 {
                font-size: 26px
            }

            .button {
                min-height: 42px;
                padding: 0 16px;
                font-size: 13px
            }

            .actions {
                flex-direction: column;
                gap: 8px
            }

            .actions .button {
                width: 100%
            }

            .status-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px
            }

            .status-bar .status-right {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="top-bar">
            <span class="language-switch" aria-label="Language">
                <button data-lang="zh" class="active">中文</button><button data-lang="en">EN</button>
            </span>
        </div>
        <main class="card">
            <h1 id="title">欢迎使用 Websoft9</h1>
            <p class="desc" id="desc">您的管理控制台运行环境已准备就绪，立即开始初始化或进入控制台，开始启动和配置应用服务</p>
            <div class="status-bar" id="status-bar" aria-live="polite">
                <span class="status-dot" id="status-dot" style="width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0"></span>
                <span id="status-text" style="font-size:13px;color:var(--muted)">检测中…</span>
                <span style="color:var(--line)">·</span>
                <span id="status-port" style="font-size:13px;color:var(--muted)">端口 9000</span>
                <button class="retry-link" id="retry-button" hidden>重新检测</button>
            </div>
            <div class="actions">
                <a class="button primary" id="main-button" href="#"><span id="main-label">进入管理控制台</span><svg
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M5 12h14" />
                        <path d="m13 6 6 6-6 6" />
                    </svg></a>
            </div>
            <p style="font-size:13px;color:var(--muted);margin:12px 0 0">
                <span id="support-prefix">遇到问题？</span><a id="support-link" href="https://support.websoft9.com/docs/helpdesk#contact" target="_blank" rel="noopener" style="color:var(--blue);font-weight:600;text-decoration:none"><span id="support-label">获取技术支持</span></a>
            </p>
            <div class="hint-box" id="hint-box">
                <div class="hint-item"><span class="hint-num">1</span><span id="hint1">管理控制台运行在 9000 端口，请确保云服务器安全组或防火墙已放行该端口</span></div>
                <div class="hint-item"><span class="hint-num">2</span><span id="hint2">如果使用云厂商服务，请在控制台安全组规则中添加入站 TCP 9000</span></div>
                <div class="hint-item"><span class="hint-num">3</span><span id="hint3">遇到连接问题可通过下方技术支持链接获取帮助</span></div>
            </div>

        </main>
        <a class="brand-footer" href="https://www.websoft9.com" target="_blank" rel="noopener noreferrer" aria-label="Websoft9">
            <img id="brand-logo" src="" alt="Websoft9" style="height:36px;object-fit:contain" onerror="this.style.display='none'" />
        </a>
    </div>
    <script>
        (function () {
            var T = {
                en: {
                    title: 'Welcome to Websoft9',
                    desc: 'Your management console environment is ready — start initialization or open the console to deploy and configure applications',
                    mainReady: 'Open Console',
                    mainInit: 'Start Setup',
                    support: 'Support',
                    hint1: 'The management console runs on port 9000 — ensure your cloud security group or firewall allows this port',
                    hint2: 'If using a cloud provider, add an inbound TCP 9000 rule in the security group settings',
                    hint3: 'For connection issues, use the support link below to get help',
                    statusTitle: 'Management Console Running',
                    statusOk: 'Port {port} · Connected',
                    statusFail: 'Cannot reach console',
                    statusFailDetail: 'Please open TCP port {port} in your security group or firewall, then ',
                    statusChecking: 'Checking…',
                    badgeOk: 'Available',
                    badgeErr: 'Unreachable',
                    retry: 'Retry'
                },
                zh: {
                    title: '欢迎使用 Websoft9',
                    desc: '您的管理控制台运行环境已准备就绪，立即开始初始化或进入控制台，开始启动和配置应用服务',
                    mainReady: '进入管理控制台',
                    mainInit: '点击开始初始化',
                    support: '获取支持',
                    hint1: '管理控制台运行在 9000 端口，请确保云服务器安全组或防火墙已放行该端口',
                    hint2: '如果使用云厂商服务，请在控制台安全组规则中添加入站 TCP 9000',
                    hint3: '遇到连接问题可通过下方技术支持链接获取帮助',
                    statusTitle: '管理控制台运行中',
                    statusOk: '端口 {port} · 连接正常',
                    statusFail: '无法连接控制台',
                    statusFailDetail: '请在云服务器安全组或防火墙中放行 TCP {port} 端口后',
                    statusChecking: '检测中…',
                    badgeOk: '可用',
                    badgeErr: '不可达',
                    retry: '重新检测'
                }
            };
            var LK = {
                support: { en: 'https://support.websoft9.com/en/docs/helpdesk#contact', zh: 'https://support.websoft9.com/docs/helpdesk#contact' }
            };
            var LOGOS = { zh: 'websoft-zh.svg', en: 'websoft9-en.svg' };
            var ICON_OK = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
            var ICON_ERR = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';
            var port = (function(){ var p = '__W9_CONSOLE_PORT__'; return /^\\d+$/.test(p) ? p : '9000' })() || '9000',
                base = location.protocol + '//' + location.hostname + ':' + port,
                state = 'checking',
                started = false,
                lang = (navigator.language || '').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en';
            try { var saved = localStorage.getItem('websoft9-welcome-lang'); if (saved === 'zh' || saved === 'en') lang = saved } catch (e) { }

            function $(id) { return document.getElementById(id) }

            function t(key) { return T[lang][key].replace('{port}', port) }

            function setLang(l) {
                lang = l;
                document.documentElement.lang = l;
                $('title').textContent = t('title');
                $('desc').textContent = t('desc');
                $('support-label').textContent = t('support');
                $('support-link').href = LK.support[l];
                $('brand-logo').src = location.protocol + '//' + location.hostname + ':' + port + '/' + LOGOS[l];
                $('hint1').textContent = t('hint1');
                $('hint2').textContent = t('hint2');
                $('hint3').textContent = t('hint3');
                if (state === 'ready') { $('main-label').textContent = started ? t('mainReady') : t('mainInit') } else { $('main-label').textContent = t('mainReady') }
                $('retry-button').textContent = t('retry');
                document.querySelectorAll('[data-lang]').forEach(function (b) { b.classList.toggle('active', b.dataset.lang === l) });
                renderStatus();
            }

            function renderStatus() {
                var dot = $('status-dot'),
                    text = $('status-text'),
                    portEl = $('status-port'),
                    retry = $('retry-button'),
                    hintBox = $('hint-box');
                retry.hidden = state !== 'error';
                hintBox.classList.toggle('visible', state === 'error');
                if (state === 'ready') {
                    dot.style.background = 'var(--green)';
                    text.textContent = t('statusTitle');
                    portEl.textContent = t('statusOk');
                    portEl.style.display = '';
                } else if (state === 'error') {
                    dot.style.background = 'var(--red)';
                    text.textContent = t('statusFailDetail');
                    portEl.style.display = 'none';
                } else {
                    dot.style.background = 'var(--green)';
                    text.textContent = t('statusChecking');
                    portEl.textContent = t('statusOk');
                    portEl.style.display = '';
                }
            }

            function setError() {
                state = 'error';
                var b = $('main-button');
                b.href = '#';
                b.classList.add('disabled');
                renderStatus();
                setLang(lang);
            }

            function setReady(isInit) {
                state = 'ready';
                started = isInit;
                var b = $('main-button');
                b.href = base;
                b.classList.remove('disabled');
                renderStatus();
                setLang(lang);
            }

            function check() {
                state = 'checking';
                renderStatus();
                setLang(lang);
                var b = $('main-button');
                b.href = '#';
                b.classList.add('disabled');
                var ctrl = new AbortController(),
                    timer = setTimeout(function () { ctrl.abort() }, 4000);
                fetch(base + '/w9gateway/healthz', { mode: 'cors', cache: 'no-store', signal: ctrl.signal }).then(function (r) {
                    clearTimeout(timer);
                    if (!r.ok) { setError(); return }
                    fetch(base + '/api/auth/gateway-access', { mode: 'cors', cache: 'no-store', redirect: 'manual' }).then(function (a) { setReady(a.status !== 403) }).catch(function () { setReady(true) });
                }).catch(function () { clearTimeout(timer); setError() });
            }
            document.querySelectorAll('[data-lang]').forEach(function (b) { b.addEventListener('click', function () { setLang(b.dataset.lang); try { localStorage.setItem('websoft9-welcome-lang', b.dataset.lang) } catch (e) { } }) });
            $('retry-button').addEventListener('click', check);

            setLang(lang);
            setTimeout(check, 300);
        })();
    </script>
</body>

</html>
