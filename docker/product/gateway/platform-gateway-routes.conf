if ($http_referer ~* /w9deployment/) {
    rewrite ^/locales/(.*) /w9deployment/locales/$1 break;
}

location = /w9gateway/healthz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok","service":"platform-gateway"}';
}

location / {
    root /etc/websoft9/console;
    try_files $uri $uri/ /index.html;
}

location /w9deployment/ {
    set $portainer_authorization "";
    if ($request_uri ~ ^/w9deployment/api/) {
        set $portainer_authorization "Bearer $cookie_portainer_jwt";
    }

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Prefix /w9deployment;
    proxy_set_header Accept-Encoding "";
    proxy_set_header Authorization $portainer_authorization;
    proxy_pass http://127.0.0.1:9004/;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header X-Frame-Options;
    proxy_set_header Origin $scheme://$host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    add_header Pragma "no-cache";
    add_header Cache-Control "no-cache";
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/media/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
    add_header 'Access-Control-Allow-Origin' $http_origin;
    add_header 'Access-Control-Allow-Credentials' 'true';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
    sub_filter '</head>' '<script>(function(){var token="$cookie_portainer_jwt";if(!token){return;}try{window.localStorage.setItem("portainer.JWT", token);window.localStorage.setItem("portainer.jwt", token);window.localStorage.setItem("JWT", token);window.sessionStorage.setItem("portainer.JWT", token);window.sessionStorage.setItem("portainer.jwt", token);window.sessionStorage.setItem("JWT", token);}catch(error){console.warn("portainer token bootstrap failed", error);}})();</script></head>';
    sub_filter_once off;
    if ($request_method = OPTIONS) {
        return 204;
    }
}

location /w9proxy/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass http://websoft9-proxy:81;
    rewrite ^/w9proxy/?(.*)$ /$1 break;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_cache_bypass $http_secret_header;
    proxy_set_header Accept-Encoding "";
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/media/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
    add_header Pragma "no-cache";
    add_header Cache-Control "no-cache";
    if ($request_method = OPTIONS) {
        return 204;
    }
    sub_filter '</head>' "<script>var tokens='$cookie_nginx_tokens';(tokens)?window.localStorage.setItem('nginx-proxy-manager-tokens', '[{\"t\":\"$cookie_nginx_tokens\",\"n\":\"$cookie_nginx_nikeName\"}]'):null;</script></head>";
    sub_filter 'href="/' 'href="/w9proxy/';
    sub_filter 'src="/' 'src="/w9proxy/';
    sub_filter '/api' '/w9proxy/api';
    sub_filter '/assets' '/w9proxy/assets';
    sub_filter '/js/' '/w9proxy/js/';
    sub_filter 'r.p="/' 'r.p="/w9proxy/';
    sub_filter '"/login' '"/w9proxy/login';
    sub_filter 'case"/logout"' 'case"/w9proxy/logout"';
    sub_filter 'window.location="/"' 'window.location="/w9proxy/"';
    sub_filter 'history.start({pushState:!0})' 'history.start({pushState:!0,root: "/w9proxy/"})';
    sub_filter 'i.history.navigate(e.' 'i.history.navigate(e.replace("/w9proxy","").';
    sub_filter_types *;
    sub_filter_once off;
}

location /w9git/ {
    client_max_body_size 0;
    proxy_pass http://websoft9-git:3001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Prefix /w9git;
    proxy_redirect http://websoft9-git:3001/ /w9git/;
    proxy_redirect http://127.0.0.1:3001/ /w9git/;
    proxy_hide_header X-Frame-Options;
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/media/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
    add_header 'Access-Control-Allow-Origin' $http_origin;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-xsrf-token';
    add_header 'Access-Control-Allow-Credentials' 'true';
    if ($request_method = OPTIONS) {
        return 204;
    }
}

location /api/ {
    proxy_pass http://websoft9-apphub:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/websoft9/platform-gateway/apphub-auth.conf;
    proxy_read_timeout 7200s;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/media/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
    add_header 'Access-Control-Allow-Origin' $http_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-api-key' always;
    if ($request_method = OPTIONS) {
        return 204;
    }
}

location /media/ {
    proxy_pass http://websoft9-apphub:8081/images/;
}