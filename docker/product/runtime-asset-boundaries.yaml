model_version: 2026-04-22
story: 1.6
runtime: websoft9-single-container
asset_classes:
  immutable_image_assets:
    description: Shipped with the image and replaced by image upgrades instead of operator-side edits.
    paths:
      - /etc/websoft9
      - /etc/supervisor/conf.d/websoft9-platform.conf
      - /websoft9/script
  persistent_service_mounts:
    description: Service-owned paths that should stay mounted or copied forward across redeploy, backup, and migration work.
    paths:
      - /data/gitea
      - /data/portainer
      - /data/nginx-proxy-manager
      - /etc/letsencrypt
      - /etc/modsec
      - /etc/custom
      - /var/log/websoft9
  ephemeral_runtime_state:
    description: Rebuilt at boot and not a backup source of truth.
    paths:
      - /run/websoft9
      - /run/supervisor.sock
      - /run/supervisord.pid

services:
  apphub:
    config:
      - path: /websoft9/apphub/src/config
        persistence: image-defaults-plus-product-managed-updates
        recovery: recreate from image defaults, then reapply product configuration through AppHub-managed settings
    data:
      - path: /websoft9/library
        persistence: copy-forward
        recovery: preserve or restore for app catalog and runtime library continuity
      - path: /websoft9/media
        persistence: copy-forward
        recovery: preserve or restore for media and asset continuity
    logs:
      - path: /websoft9/apphub/logs
        persistence: optional-copy-forward
        recovery: retain when diagnostics or migration audit history are required
  gitea:
    config:
      - path: /data/gitea/conf
        persistence: mounted
        recovery: must be preserved with the rest of /data/gitea
    data:
      - path: /data/gitea
        persistence: mounted
        recovery: required for repositories, database, and service continuity
    secrets:
      - path: /data/gitea/credential
        persistence: mounted
        recovery: preserve or regenerate with coordinated admin reset; treat as secret material
    logs:
      - path: /var/log/websoft9/gitea
        persistence: optional-mounted
        recovery: retain for diagnostics when needed
  portainer:
    data:
      - path: /data/portainer
        persistence: mounted
        recovery: required for Portainer state and endpoint continuity
    secrets:
      - path: /data/portainer/credential
        persistence: mounted
        recovery: preserve or rotate intentionally; treat as secret material
    logs:
      - path: /var/log/websoft9/portainer
        persistence: optional-mounted
        recovery: retain for diagnostics when needed
  nginx_proxy_manager:
    config:
      - path: /data/nginx-proxy-manager
        persistence: mounted
        recovery: required for NPM database, proxy-host definitions, and product-side workspace continuity
      - path: /etc/custom
        persistence: mounted
        recovery: required for product-owned custom gateway overrides
      - path: /etc/modsec
        persistence: mounted
        recovery: required only when ModSecurity customizations are enabled
    data:
      - path: /etc/letsencrypt
        persistence: mounted
        recovery: required for issued certificates and ACME continuity
      - path: /data/nginx-proxy-manager/custom_ssl
        persistence: mounted
        recovery: required for Websoft9 inner certificate continuity
    secrets:
      - path: /data/nginx-proxy-manager/credential.json
        persistence: mounted
        recovery: preserve or rotate intentionally; treat as secret material
    logs:
      - path: /var/log/websoft9/nginx-proxy-manager
        persistence: optional-mounted
        recovery: retain for diagnostics when needed
  platform_gateway:
    config:
      - path: /etc/websoft9/platform-gateway
        persistence: image-managed
        recovery: restored by image redeploy and startup rewrites
    logs:
      - path: /var/log/websoft9/platform-gateway-access.log
        persistence: optional-mounted
        recovery: retain for ingress diagnostics when needed
      - path: /var/log/websoft9/platform-gateway-error.log
        persistence: optional-mounted
        recovery: retain for ingress failure analysis when needed
    ephemeral:
      - path: /run/websoft9/platform-gateway.pid
        persistence: ephemeral
        recovery: regenerated when the dedicated platform gateway process restarts
  runtime_supervisor:
    config:
      - path: /etc/supervisor/conf.d/websoft9-platform.conf
        persistence: image-managed
        recovery: restored by image redeploy
    logs:
      - path: /var/log/websoft9/platform-runtime.log
        persistence: optional-mounted
        recovery: retain as the standardized Websoft9 platform runtime log source for the product logs module
      - path: /var/log/websoft9/supervisord.log
        persistence: optional-mounted
        recovery: retain when restart and bootstrap diagnostics are required
    ephemeral:
      - path: /run/websoft9/runtime-status.json
        persistence: ephemeral
        recovery: regenerate from current health state after boot

mount_expectations:
  inherited_legacy_mounts:
    - /data
  stable_mounts:
    - /data/gitea
    - /data/portainer
    - /data/nginx-proxy-manager
    - /etc/letsencrypt
    - /etc/modsec
    - /etc/custom
    - /var/log/websoft9
  copy_forward_assets:
    - /websoft9/library
    - /websoft9/media
  non_backup_runtime_state:
    - /run/websoft9
    - /run/supervisor.sock
    - /run/supervisord.pid

notes:
  - Secret-bearing files stay inside service-owned directories so backup and migration tooling can preserve them without reopening route or runtime topology decisions.
  - AppHub library and media paths are copy-forward assets instead of declared Docker volumes because empty volume mounts would shadow image-shipped baseline content.
  - Product-origin ingress now runs through a dedicated platform-gateway process with image-managed config under /etc/websoft9/platform-gateway, while NPM remains the app-domain proxy owner behind its own runtime and data paths.
  - The upstream Nginx Proxy Manager base image still contributes a legacy `/data` Docker volume. Treat it as a compatibility umbrella only; backup, restore, and migration tooling should target the service-owned subpaths listed above instead of using `/data` as an undifferentiated asset boundary.