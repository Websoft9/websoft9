# Websoft9 product-origin traffic is owned by the platform gateway layer.
# User application domains remain under Nginx Proxy Manager proxy_host configs.

set $websoft9_route_owner "platform-gateway";
set $websoft9_app_access_owner "nginx-proxy-manager";

add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/media/,/w9deployment/,/w9proxy/,/w9git/" always;