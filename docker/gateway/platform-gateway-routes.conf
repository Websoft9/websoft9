if ($http_referer ~* /w9deployment/) {
    rewrite ^/locales/(.*) /w9deployment/locales/$1 break;
}

location = /w9gateway/healthz {
    access_log off;
    default_type application/json;
    add_header Access-Control-Allow-Origin * always;
    return 200 '{"status":"ok","service":"platform-gateway"}';
}

location ~ ^/auth/(login|setup)/?$ {
    root /etc/websoft9/console;
    try_files /index.html =404;
}

location ~ ^/setup/?$ {
    set $websoft9_setup_route /setup;
    auth_request /api/auth/setup-access;
    auth_request_set $websoft9_setup_route $upstream_http_x_websoft9_setup_route;
    error_page 403 = @websoft9_setup_dispatch;
    root /etc/websoft9/console;
    try_files /index.html =404;
}

location ~* ^/(assets/.*|.*\.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map|webp))$ {
    root /etc/websoft9/console;
    try_files $uri =404;
}

location ^~ /media/ {
    alias /websoft9/media/;
    add_header Cache-Control "public, max-age=300";
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
}

location / {
    set $websoft9_setup_route /auth/setup;
    auth_request /api/auth/gateway-access;
    auth_request_set $websoft9_setup_route $upstream_http_x_websoft9_setup_route;
    error_page 401 = @websoft9_auth_login;
    error_page 403 = @websoft9_auth_setup_dispatch;
    root /etc/websoft9/console;
    try_files $uri $uri/ /index.html;
}

location @websoft9_auth_login {
    return 302 /auth/login;
}

location @websoft9_setup_dispatch {
    if ($websoft9_setup_route = /dashboard) {
        return 302 /dashboard;
    }
    if ($websoft9_setup_route = /auth/setup) {
        return 302 /auth/setup;
    }
    if ($websoft9_setup_route = /auth/login) {
        return 302 /auth/login;
    }
    return 404;
}

location @websoft9_auth_setup_dispatch {
    if ($websoft9_setup_route = /setup) {
        return 302 /setup;
    }
    return 302 /auth/setup;
}

location ^~ /w9deployment/ {
    set $websoft9_setup_route /auth/setup;
    auth_request /api/auth/gateway-access;
    auth_request_set $websoft9_setup_route $upstream_http_x_websoft9_setup_route;
    error_page 401 = @websoft9_auth_login;
    error_page 403 = @websoft9_auth_setup_dispatch;
    set $portainer_authorization "";
    set $portainer_bootstrap_token "__W9_PORTAINER_COOKIE_REF__";
    if ($portainer_bootstrap_token = "") {
        set $portainer_bootstrap_token "$cookie_portainer_jwt";
    }
    if ($request_uri ~ ^/w9deployment/api/) {
        set $portainer_authorization "Bearer $portainer_bootstrap_token";
    }
    if ($portainer_bootstrap_token = "") {
        set $portainer_authorization "";
    }

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Prefix /w9deployment;
    proxy_set_header Accept-Encoding "";
    proxy_set_header Authorization $portainer_authorization;
    proxy_pass http://127.0.0.1:9004/;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header X-Frame-Options;
    proxy_set_header Origin $scheme://$host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    add_header Pragma "no-cache";
    add_header Cache-Control "no-cache";
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
    add_header 'Access-Control-Allow-Origin' $http_origin;
    add_header 'Access-Control-Allow-Credentials' 'true';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
    # Portainer auth bootstrap: clear ALL portainer.* keys (future-proof)
    # before any Portainer script runs, then seed legacy JWT aliases.
    sub_filter '<head>' '<head><script>!function(){var t="$portainer_bootstrap_token",e=[window.localStorage,window.sessionStorage];e.forEach(function(e){if(e)try{Object.keys(e).forEach(function(a){if(0===a.indexOf("portainer.")||"JWT"===a)try{e.removeItem(a)}catch(t){}})}catch(t){}});if(t){var a=["portainer.JWT","portainer.jwt","JWT"];e.forEach(function(e){if(e)try{a.forEach(function(a){try{e.setItem(a,t)}catch(t){}})}catch(t){}})}}();</script>';
    sub_filter_once off;
    if ($request_method = OPTIONS) {
        return 204;
    }
}

location ^~ /w9proxy/ {
    set $websoft9_setup_route /auth/setup;
    auth_request /api/auth/gateway-access;
    auth_request_set $websoft9_setup_route $upstream_http_x_websoft9_setup_route;
    error_page 401 = @websoft9_auth_login;
    error_page 403 = @websoft9_auth_setup_dispatch;
    set $npm_bootstrap_tokens "__W9_NPM_TOKEN_COOKIE_REF__";
    set $npm_bootstrap_nickname "__W9_NPM_NICKNAME_COOKIE_REF__";
    if ($npm_bootstrap_tokens = "") {
        set $npm_bootstrap_tokens "$cookie_nginx_tokens";
    }
    if ($npm_bootstrap_nickname = "") {
        set $npm_bootstrap_nickname "$cookie_nginx_nikeName";
    }
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass http://websoft9-proxy:81;
    rewrite ^/w9proxy/?(.*)$ /$1 break;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_cache_bypass $http_secret_header;
    proxy_set_header Accept-Encoding "";
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
    add_header Pragma "no-cache";
    add_header Cache-Control "no-cache";
    if ($request_method = OPTIONS) {
        return 204;
    }
    sub_filter '</head>' "<script>(function(){var token='$npm_bootstrap_tokens';var nickname='$npm_bootstrap_nickname';if(!token){return;}var payload='[{\"t\":\"'+token+'\",\"n\":\"'+nickname+'\"}]';var storageKeys=['nginx-proxy-manager-tokens'];var storageScopes=[window.localStorage,window.sessionStorage];try{storageScopes.forEach(function(storage){storageKeys.forEach(function(key){storage.removeItem(key);storage.setItem(key,payload);});});}catch(error){console.warn('npm token bootstrap failed', error);}})();</script></head>";
    sub_filter 'href="/' 'href="/w9proxy/';
    sub_filter 'src="/' 'src="/w9proxy/';
    sub_filter '/api' '/w9proxy/api';
    sub_filter '/assets' '/w9proxy/assets';
    sub_filter '/js/' '/w9proxy/js/';
    sub_filter 'r.p="/' 'r.p="/w9proxy/';
    sub_filter '"/login' '"/w9proxy/login';
    sub_filter 'case"/logout"' 'case"/w9proxy/logout"';
    sub_filter 'window.location="/"' 'window.location="/w9proxy/"';
    sub_filter 'history.start({pushState:!0})' 'history.start({pushState:!0,root: "/w9proxy/"})';
    sub_filter 'i.history.navigate(e.' 'i.history.navigate(e.replace("/w9proxy","").';
    sub_filter_types *;
    sub_filter_once off;
}

location ^~ /w9git/ {
    auth_request /api/auth/gateway-access;
    error_page 401 = @websoft9_auth_login;
    error_page 403 = @websoft9_auth_setup;
    client_max_body_size 0;
    proxy_pass http://websoft9-git:3001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Prefix /w9git;
    proxy_redirect http://websoft9-git:3001/ /w9git/;
    proxy_hide_header X-Frame-Options;
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
    add_header 'Access-Control-Allow-Origin' $http_origin;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-xsrf-token';
    add_header 'Access-Control-Allow-Credentials' 'true';
    if ($request_method = OPTIONS) {
        return 204;
    }
}

location = /host-access/terminal/ws {
    proxy_pass http://websoft9-apphub:8080/host-access/terminal/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/websoft9/platform-gateway/apphub-auth.conf;
    proxy_read_timeout 7200s;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
}

location ^~ /api/media/ {
    proxy_pass http://websoft9-apphub:8081/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/websoft9/platform-gateway/apphub-auth.conf;
    proxy_read_timeout 7200s;
    client_max_body_size 10m;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
}

location /api/ {
    proxy_pass http://websoft9-apphub:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/websoft9/platform-gateway/apphub-auth.conf;
    proxy_read_timeout 7200s;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    add_header X-Websoft9-Route-Owner $websoft9_route_owner always;
    add_header X-Websoft9-App-Access-Owner $websoft9_app_access_owner always;
    add_header X-Websoft9-Reserved-Platform-Prefixes "/,/api/,/w9deployment/,/w9proxy/,/w9git/,/w9gateway/healthz" always;
    add_header 'Access-Control-Allow-Origin' $http_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-api-key' always;
    if ($request_method = OPTIONS) {
        return 204;
    }
}
