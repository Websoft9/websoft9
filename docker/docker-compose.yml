# Production docker-compose.yml — single-container runtime
# Usage: docker compose -f docker-compose.yml up -d

name: websoft9

services:
  product:
    image: ${IMAGE_REPO:-websoft9dev/websoft9}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-websoft9}
    restart: always
    ports:
      - "${CONSOLE_PORT:-9000}:9000"
      - "80:80"
      - "443:443"
    volumes:
      # Keep /data as a host bind mount so Portainer's Git stack workspace
      # paths resolve identically inside the product container and on the host.
      - ${WEBSOFT9_DATA_ROOT:-/data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "owner=websoft9"
      - "com.docker.compose.w9_http.port=9000"
    networks:
      - websoft9

networks:
  websoft9:
    name: ${NETWORK_NAME:-websoft9}
    driver: bridge