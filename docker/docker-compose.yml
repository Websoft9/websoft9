# Production docker-compose.yml — single-container runtime
# Usage: docker compose up -d
#
# For local development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  product:
    image: ${IMAGE_REPO:-websoft9dev/websoft9-product}:${IMAGE_TAG:-latest}
    container_name: websoft9
    restart: always
    ports:
      - "${CONSOLE_PORT:-9000}:9000"
      - "80:80"
      - "443:443"
    volumes:
      - product_data:/data
      - product_custom:/etc/custom
      - product_letsencrypt:/etc/letsencrypt
      - product_modsec:/etc/modsec
      - product_logs:/var/log/websoft9
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "owner=websoft9"
      - "com.docker.compose.w9_http.port=9000"
    networks:
      - websoft9

volumes:
  product_data:
  product_custom:
  product_letsencrypt:
  product_modsec:
  product_logs:

networks:
  websoft9:
    name: ${NETWORK_NAME:-websoft9}
    driver: bridge