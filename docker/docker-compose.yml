# Production docker-compose.yml — single-container runtime
# Usage: docker compose -f docker-compose.yml up -d

name: websoft9

services:
  product:
    image: ${IMAGE_REPO:-websoft9dev/websoft9}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-websoft9}
    restart: always
    environment:
      WEBSOFT9_DATA_ROOT: ${WEBSOFT9_DATA_ROOT:-/opt/websoft9/data}
      WEBSOFT9_DOCKER_VOLUMES_ROOT: ${WEBSOFT9_DOCKER_VOLUMES_ROOT:-/var/lib/docker/volumes}
      WEBSOFT9_PLATFORM_HTTP_PORT: ${CONSOLE_PORT:-9000}
    ports:
      - "${CONSOLE_PORT:-9000}:9000"
      - "80:80"
      - "443:443"
    volumes:
      # Bind the runtime root to the same absolute path inside the container so
      # Portainer-generated stack workspace paths also resolve on the host.
      - ${WEBSOFT9_DATA_ROOT:-/opt/websoft9/data}:${WEBSOFT9_DATA_ROOT:-/opt/websoft9/data}
      - ${WEBSOFT9_DOCKER_VOLUMES_ROOT:-/var/lib/docker/volumes}:${WEBSOFT9_DOCKER_VOLUMES_ROOT:-/var/lib/docker/volumes}
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "owner=websoft9"
      - "com.docker.compose.w9_http.port=9000"
    networks:
      - websoft9

networks:
  websoft9:
    external: true
    name: websoft9