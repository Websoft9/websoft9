; Gitea 配置文件
; 参考: https://docs.gitea.com/zh-cn/administration/config-cheat-sheet

APP_NAME = Websoft9 Git
RUN_MODE = prod
RUN_USER = git
WORK_PATH = /var/lib/gitea

[server]
HTTP_PORT = 3000
PROTOCOL = http
DOMAIN = localhost
ROOT_URL = http://localhost/w9git/
DISABLE_SSH = true
OFFLINE_MODE = true
LFS_START_SERVER = false

[database]
DB_TYPE = sqlite3
PATH = /var/lib/gitea/data/gitea.db

[repository]
ROOT = /var/lib/gitea/data/gitea-repositories

[security]
INSTALL_LOCK = true
SECRET_KEY = $(openssl rand -hex 32 2>/dev/null || echo "websoft9-default-secret-key-change-me")
INTERNAL_TOKEN = $(openssl rand -hex 32 2>/dev/null || echo "websoft9-internal-token-change-me")

[service]
DISABLE_REGISTRATION = true
REQUIRE_SIGNIN_VIEW = false

[log]
MODE = console
LEVEL = info
ROOT_PATH = /var/lib/gitea/log

[session]
PROVIDER = file
PROVIDER_CONFIG = /var/lib/gitea/data/sessions

[picture]
AVATAR_UPLOAD_PATH = /var/lib/gitea/data/avatars
REPOSITORY_AVATAR_UPLOAD_PATH = /var/lib/gitea/data/repo-avatars

[attachment]
PATH = /var/lib/gitea/data/attachments
