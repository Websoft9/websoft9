user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    # WebSocket 代理配置
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # 上游服务器
    upstream cockpit {
        server 127.0.0.1:9090;
    }

    upstream portainer {
        server 127.0.0.1:9000;
    }

    upstream gitea {
        server 127.0.0.1:3000;
    }

    upstream apphub {
        server 127.0.0.1:8080;
    }

    # HTTP 服务器
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # 客户端最大上传大小
        client_max_body_size 100M;

        # Portainer API 认证端点
        location = /w9deployment/api/auth {
            proxy_set_header Cookie "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            # 转发到后端真实路径（去掉 /w9deployment 前缀）
            proxy_pass http://portainer/api/auth$is_args$args;
        }

        # Portainer 代理 (w9deployment)
        location /w9deployment/ {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            proxy_pass http://portainer/;
            proxy_set_header Origin $scheme://$host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            add_header 'Access-Control-Allow-Origin' $http_origin;
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Gitea 代理 (w9git)
        location /w9git/ {
            proxy_pass http://gitea/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Frame-Options;
            add_header 'Access-Control-Allow-Origin' $http_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-xsrf-token';
            add_header 'Access-Control-Allow-Credentials' 'true';
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Apphub API 代理 (w9api)
        location /w9api/ {
            proxy_pass http://apphub/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
        }

        # Apphub Media 静态文件（直接提供）
        location /w9media/ {
            alias /websoft9/media/;
            autoindex off;
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Cockpit 代理 (默认)
        location / {
            proxy_pass http://cockpit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 超时设置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Cockpit 需要
            proxy_buffering off;
            gzip off;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # 为未来扩展预留配置目录
    include /etc/nginx/conf.d/*.conf;
}
