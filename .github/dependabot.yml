version: 2
updates:
  # Python dependencies (AppHub)
  - package-ecosystem: pip
    directory: /apphub
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    reviewers:
      - websoft9dev/core

  # Console npm dependencies
  - package-ecosystem: npm
    directory: /console
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    groups:
      react:
        patterns:
          - react
          - react-dom
          - '@types/react*'
      mui:
        patterns:
          - '@mui/*'
          - '@emotion/*'
      devtools:
        patterns:
          - eslint*
          - prettier*
          - typescript*
          - vite*
          - vitest*
          - globals
    reviewers:
      - websoft9dev/core

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    groups:
      all-actions:
        patterns:
          - '*'
