name: Release Webhook (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to announce'
        required: false
        default: ''
      channel:
        description: 'Release channel'
        type: choice
        options:
          - release
          - rc
          - dev
        default: release

jobs:
  send_webhook:
    name: Send WeChat Notification
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Send notification
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANNEL="${{ github.event.inputs.channel }}"

          if [[ -z "$VERSION" ]]; then
            VERSION=$(jq -r '.version' version.json)
          fi

          if [[ "$VERSION" == *-* ]]; then
            VERSION="${VERSION%%-*}（预发布）"
          fi

          CHANGELOG=$(cat changelog_latest.md 2>/dev/null | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g' || echo "No changelog")

          curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WIXIN_ROBOT_KEY }}' \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"【Release 通知】\\n> 项目名称：<font color=\\\"info\\\">websoft9</font>\\n> 发布通道：<font color=\\\"comment\\\">${CHANNEL}</font>\\n> 最新版本：<font color=\\\"comment\\\">${VERSION}</font>\\n> 更新内容：\\n${CHANGELOG}\\n>\"
              }
            }"