name: Pull Request Validation

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'media/**'
      - 'logs/**'
      - '.gitignore'
      - 'LICENSE*'

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Governance: branch naming and merge direction ──
  governance-check:
    name: Governance Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR branch policy
        run: |
          set -euo pipefail

          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"

          echo "Base branch: $BASE_REF"
          echo "Head branch: $HEAD_REF"

          if [[ "$BASE_REF" == "main" ]]; then
            if [[ "$HEAD_REF" != "dev" ]]; then
              echo "::error::PRs into main must come from dev"
              exit 1
            fi
          elif [[ "$BASE_REF" == "dev" ]]; then
            if [[ ! "$HEAD_REF" =~ ^(feature/.+|bugfix/.+|chore/.+|refactor/.+|docs/.+|test/.+)$ ]]; then
              echo "::error::PRs into dev must come from feature/*, bugfix/*, chore/*, refactor/*, docs/*, or test/* branches"
              exit 1
            fi
          else
            echo "::error::Unsupported base branch: $BASE_REF"
            exit 1
          fi

          echo "✅ Branch naming and merge direction policy passed"

  # ── Security: Secret detection (run first, fail fast) ──
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Change detection (skip irrelevant jobs) ──
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      console: ${{ steps.filter.outputs.console }}
      cli: ${{ steps.filter.outputs.cli }}
      docker: ${{ steps.filter.outputs.docker }}
      scripts: ${{ steps.filter.outputs.scripts }}
      appstore_data: ${{ steps.filter.outputs.appstore_data }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'apphub/**'
              - 'requirements*.txt'
            console:
              - 'console/**'
            cli:
              - 'cli/**'
            docker:
              - 'docker/**'
              - 'Dockerfile'
            scripts:
              - 'scripts/**'
              - 'install/**'
            appstore_data:
              - '.github/workflows/release.yml'
              - 'apphub/src/cli/apphub_cli.py'
              - 'apphub/src/api/v1/routers/appstore_sync.py'
              - 'apphub/src/services/appstore_sync_manager.py'
              - 'apphub/src/services/app_manager.py'
              - 'apphub/tests/test_apphub_cli_upgrade.py'
              - 'apphub/tests/test_appstore_sync_manager_versions.py'
              - 'docker/scripts/platform-sync-runtime-assets.py'
              - 'scripts/generate_appstore_install_metadata.py'
              - 'scripts/update_zip.sh'
              - 'scripts/validate_appstore_catalog_artifact.sh'
              - 'scripts/validate_appstore_dataset_manifests.sh'
              - 'scripts/validate_appstore_library_artifact.sh'
              - 'scripts/validate_appstore_library_metadata.sh'
              - 'scripts/list_appstore_dataset_versions.sh'
              - 'scripts/switch_appstore_dataset_manifest.sh'
              - 'scripts/appstore_dataset_hotfix_helper.sh'

  # ── Version and metadata consistency ──
  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Validate version metadata
        run: |
          set -euo pipefail

          VERSION=$(jq -r '.version' version.json)
          EDITION_KEY=$(jq -r '.edition_key // empty' version.json)

          if [[ -z "$VERSION" ]] || [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version.json version is invalid: '$VERSION'"
            exit 1
          fi

          if [[ -z "$EDITION_KEY" ]]; then
            echo "::error::version.json edition_key must not be empty"
            exit 1
          fi

          if [[ ! -f cli/version ]]; then
            echo "::error::cli/version file is missing"
            exit 1
          fi

          grep -Eq '^stable:[[:space:]]*[0-9]+\.[0-9]+$' cli/version || {
            echo "::error::cli/version must contain 'stable: <major.minor>'"
            exit 1
          }

          grep -Eq '^compatible:[[:space:]]*[0-9]+\.[0-9]+$' cli/version || {
            echo "::error::cli/version must contain 'compatible: <major.minor>'"
            exit 1
          }

          if [[ ! -f apphub/setup.py ]]; then
            echo "::error::apphub/setup.py is missing"
            exit 1
          fi

          grep -Eq "version='[0-9]+(\.[0-9]+){1,2}'" apphub/setup.py || {
            echo "::error::apphub/setup.py must declare a numeric version"
            exit 1
          }

          if [[ ! -f console/package.json ]]; then
            echo "::error::console/package.json is missing"
            exit 1
          fi

          CONSOLE_VERSION=$(jq -r '.version // empty' console/package.json)
          if [[ -z "$CONSOLE_VERSION" ]]; then
            echo "::error::console/package.json version must not be empty"
            exit 1
          fi

          echo "✅ Version metadata validated"

  # ── Python Backend Checks ──
  python-ci:
    name: Python CI
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apphub
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            apphub/requirements.txt
            apphub/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov pytest-asyncio httpx
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true

      - name: Ruff lint
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

      - name: Mypy type check
        run: mypy src/

      - name: Unit tests + coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=60 2>&1 || \
            echo "::warning::Coverage below threshold or tests failed"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apphub/coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Console Frontend Checks ──
  console-ci:
    name: Console CI
    needs: changes
    if: needs.changes.outputs.console == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build check
        run: npm run build

      - name: Run tests (if configured)
        run: |
          if npm run test --if-present 2>/dev/null; then
            echo "✅ Tests passed"
          else
            echo "⚠️ No test script configured — skipping"
          fi

  # ── CLI Checks ──
  cli-ci:
    name: CLI CI
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: cli/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m compileall -q .

      - name: Optional unit tests
        run: |
          if python -m unittest discover -p 'test*.py' -v; then
            echo "✅ CLI tests passed"
          else
            echo "::warning::CLI tests failed or are not unittest-compatible"
          fi

  # ── Dockerfile Lint ──
  dockerfile-lint:
    name: Dockerfile Lint
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3
        with:
          dockerfile: docker/Dockerfile
          ignore: DL3008,DL3013
          failure-threshold: warning

  # ── Shell script checks ──
  shellcheck:
    name: ShellCheck
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on scripts
        run: |
          find scripts/ install/ -type f \( -name "*.sh" -o -executable \) -print0 | \
            xargs -0 -I{} sh -c 'echo "Checking {}" && shellcheck -e SC1091,SC2034 "{}" || true'

  # ── App Store artifact validator smoke checks ──
  appstore-artifact-ci:
    name: App Store Artifact CI
    needs: changes
    if: needs.changes.outputs.appstore_data == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Install validator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq rsync wget zip

      - name: Smoke test AppHub appstore sync entrypoints
        run: |
          set -euo pipefail
          cd apphub
          python3 -m pytest -q -o addopts='' tests/test_apphub_cli_upgrade.py tests/test_appstore_sync_manager_versions.py

      - name: Smoke test catalog artifact validator
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          mkdir -p "$tmpdir/../library"
          printf 'demo artifact\n' > "$tmpdir/catalog-dev.zip"
          sha256sum "$tmpdir/catalog-dev.zip" | awk '{print $1}' > "$tmpdir/catalog-dev.zip.sha256"
          printf 'legacy media payload\n' > "$tmpdir/media-dev.zip"
          sha256sum "$tmpdir/media-dev.zip" | awk '{print $1}' > "$tmpdir/media-dev.zip.sha256"
          printf 'library payload\n' > "$tmpdir/../library/library-dev.zip"
          sha256sum "$tmpdir/../library/library-dev.zip" | awk '{print $1}' > "$tmpdir/../library/library-dev.zip.sha256"
          cat > "$tmpdir/../library/apps-index.json" <<'EOF'
          {"schemaVersion":"1","datasetVersion":"2026.06.05.120000","generatedAt":"2026-06-05T12:00:00Z","apps":[{"key":"mysql"}]}
          EOF
          sha256sum "$tmpdir/../library/apps-index.json" | awk '{print $1}' > "$tmpdir/../library/apps-index.json.sha256"
          cat > "$tmpdir/../library/library-delta-bootstrap-to-2026.06.05.120000.json" <<'EOF'
          {"scope":"library","mode":"bootstrap","fromVersion":"bootstrap","toVersion":"2026.06.05.120000","changedApps":["mysql"],"generatedAt":"2026-06-05T12:00:00Z"}
          EOF
          sha256sum "$tmpdir/../library/library-delta-bootstrap-to-2026.06.05.120000.json" | awk '{print $1}' > "$tmpdir/../library/library-delta-bootstrap-to-2026.06.05.120000.json.sha256"
          cat > "$tmpdir/../library/apps-delta-bootstrap-to-2026.06.05.120000.json" <<'EOF'
          {"scope":"apps","mode":"bootstrap","fromVersion":"bootstrap","toVersion":"2026.06.05.120000","addedApps":["mysql"],"removedApps":[],"changedApps":[],"generatedAt":"2026-06-05T12:00:00Z"}
          EOF
          sha256sum "$tmpdir/../library/apps-delta-bootstrap-to-2026.06.05.120000.json" | awk '{print $1}' > "$tmpdir/../library/apps-delta-bootstrap-to-2026.06.05.120000.json.sha256"
          cat > "$tmpdir/catalog-delta-bootstrap-to-2026.06.05.120000.json" <<'EOF'
          {
            "entity": "catalog",
            "mode": "diff",
            "fromVersion": "bootstrap",
            "toVersion": "2026.06.05.120000",
            "generatedAt": "2026-06-05T12:00:00Z"
          }
          EOF
          sha256sum "$tmpdir/catalog-delta-bootstrap-to-2026.06.05.120000.json" | awk '{print $1}' > "$tmpdir/catalog-delta-bootstrap-to-2026.06.05.120000.json.sha256"
          cat > "$tmpdir/product-delta-bootstrap-to-2026.06.05.120000.json" <<'EOF'
          {
            "entity": "product",
            "mode": "diff",
            "fromVersion": "bootstrap",
            "toVersion": "2026.06.05.120000",
            "generatedAt": "2026-06-05T12:00:00Z"
          }
          EOF
          sha256sum "$tmpdir/product-delta-bootstrap-to-2026.06.05.120000.json" | awk '{print $1}' > "$tmpdir/product-delta-bootstrap-to-2026.06.05.120000.json.sha256"
          cat > "$tmpdir/manifest.json" <<'EOF'
          {
            "schemaVersion": "1",
            "datasetVersion": "2026.06.05.120000",
            "channel": "dev",
            "catalogArchive": "catalog-dev.zip",
            "libraryPackage": "../library/library-dev.zip",
            "appsIndex": "../library/apps-index.json",
            "libraryDeltaFiles": {
              "library": "../library/library-delta-bootstrap-to-2026.06.05.120000.json",
              "apps": "../library/apps-delta-bootstrap-to-2026.06.05.120000.json"
            },
            "legacyMediaArchive": "media-dev.zip",
            "deltaFiles": {
              "catalog": "catalog-delta-bootstrap-to-2026.06.05.120000.json",
              "product": "product-delta-bootstrap-to-2026.06.05.120000.json"
            },
            "checksum": {
              "catalogArchive": "catalog-dev.zip.sha256",
              "libraryPackage": "../library/library-dev.zip.sha256",
              "appsIndex": "../library/apps-index.json.sha256",
              "libraryDelta": "../library/library-delta-bootstrap-to-2026.06.05.120000.json.sha256",
              "appsDelta": "../library/apps-delta-bootstrap-to-2026.06.05.120000.json.sha256",
              "legacyMediaArchive": "media-dev.zip.sha256",
              "catalogDelta": "catalog-delta-bootstrap-to-2026.06.05.120000.json.sha256",
              "productDelta": "product-delta-bootstrap-to-2026.06.05.120000.json.sha256"
            },
            "compatibility": {
              "legacyPluginPaths": true,
              "legacyMediaPackage": true,
              "embeddedMediaRequired": false,
              "schemaVersion": "1"
            },
            "generatedAt": "2026-06-05T12:00:00Z"
          }
          EOF
          bash scripts/validate_appstore_catalog_artifact.sh "$tmpdir"

      - name: Smoke test release catalog artifact validator
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          mkdir -p "$tmpdir/../library"
          printf 'release artifact\n' > "$tmpdir/catalog.zip"
          sha256sum "$tmpdir/catalog.zip" | awk '{print $1}' > "$tmpdir/catalog.zip.sha256"
          printf 'release media payload\n' > "$tmpdir/media-latest.zip"
          sha256sum "$tmpdir/media-latest.zip" | awk '{print $1}' > "$tmpdir/media-latest.zip.sha256"
          printf 'library payload\n' > "$tmpdir/../library/library-latest.zip"
          sha256sum "$tmpdir/../library/library-latest.zip" | awk '{print $1}' > "$tmpdir/../library/library-latest.zip.sha256"
          cat > "$tmpdir/../library/app-store-install-metadata.json" <<'EOF'
          {"initial_apps":[],"apps":{"mysql":{"settings":{},"is_web_app":false}}}
          EOF
          sha256sum "$tmpdir/../library/app-store-install-metadata.json" | awk '{print $1}' > "$tmpdir/../library/app-store-install-metadata.json.sha256"
          cat > "$tmpdir/../library/apps-index.json" <<'EOF'
          {"schemaVersion":"1","datasetVersion":"2026.06.05.170000","generatedAt":"2026-06-05T17:00:00Z","apps":[{"key":"mysql"}]}
          EOF
          sha256sum "$tmpdir/../library/apps-index.json" | awk '{print $1}' > "$tmpdir/../library/apps-index.json.sha256"
          cat > "$tmpdir/../library/library-delta-bootstrap-to-2026.06.05.170000.json" <<'EOF'
          {"scope":"library","mode":"bootstrap","fromVersion":"bootstrap","toVersion":"2026.06.05.170000","changedApps":["mysql"],"generatedAt":"2026-06-05T17:00:00Z"}
          EOF
          sha256sum "$tmpdir/../library/library-delta-bootstrap-to-2026.06.05.170000.json" | awk '{print $1}' > "$tmpdir/../library/library-delta-bootstrap-to-2026.06.05.170000.json.sha256"
          cat > "$tmpdir/../library/apps-delta-bootstrap-to-2026.06.05.170000.json" <<'EOF'
          {"scope":"apps","mode":"bootstrap","fromVersion":"bootstrap","toVersion":"2026.06.05.170000","addedApps":["mysql"],"removedApps":[],"changedApps":[],"generatedAt":"2026-06-05T17:00:00Z"}
          EOF
          sha256sum "$tmpdir/../library/apps-delta-bootstrap-to-2026.06.05.170000.json" | awk '{print $1}' > "$tmpdir/../library/apps-delta-bootstrap-to-2026.06.05.170000.json.sha256"
          cat > "$tmpdir/catalog-delta-bootstrap-to-2026.06.05.170000.json" <<'EOF'
          {
            "entity": "catalog",
            "mode": "diff",
            "fromVersion": "bootstrap",
            "toVersion": "2026.06.05.170000",
            "generatedAt": "2026-06-05T17:00:00Z"
          }
          EOF
          sha256sum "$tmpdir/catalog-delta-bootstrap-to-2026.06.05.170000.json" | awk '{print $1}' > "$tmpdir/catalog-delta-bootstrap-to-2026.06.05.170000.json.sha256"
          cat > "$tmpdir/product-delta-bootstrap-to-2026.06.05.170000.json" <<'EOF'
          {
            "entity": "product",
            "mode": "diff",
            "fromVersion": "bootstrap",
            "toVersion": "2026.06.05.170000",
            "generatedAt": "2026-06-05T17:00:00Z"
          }
          EOF
          sha256sum "$tmpdir/product-delta-bootstrap-to-2026.06.05.170000.json" | awk '{print $1}' > "$tmpdir/product-delta-bootstrap-to-2026.06.05.170000.json.sha256"
          cat > "$tmpdir/manifest.json" <<'EOF'
          {
            "schemaVersion": "1",
            "datasetVersion": "2026.06.05.170000",
            "channel": "release",
            "catalogArchive": "catalog.zip",
            "libraryPackage": "../library/library-latest.zip",
            "installMetadata": "../library/app-store-install-metadata.json",
            "appsIndex": "../library/apps-index.json",
            "libraryDeltaFiles": {
              "library": "../library/library-delta-bootstrap-to-2026.06.05.170000.json",
              "apps": "../library/apps-delta-bootstrap-to-2026.06.05.170000.json"
            },
            "legacyMediaArchive": "media-latest.zip",
            "deltaFiles": {
              "catalog": "catalog-delta-bootstrap-to-2026.06.05.170000.json",
              "product": "product-delta-bootstrap-to-2026.06.05.170000.json"
            },
            "checksum": {
              "catalogArchive": "catalog.zip.sha256",
              "libraryPackage": "../library/library-latest.zip.sha256",
              "installMetadata": "../library/app-store-install-metadata.json.sha256",
              "appsIndex": "../library/apps-index.json.sha256",
              "libraryDelta": "../library/library-delta-bootstrap-to-2026.06.05.170000.json.sha256",
              "appsDelta": "../library/apps-delta-bootstrap-to-2026.06.05.170000.json.sha256",
              "legacyMediaArchive": "media-latest.zip.sha256",
              "catalogDelta": "catalog-delta-bootstrap-to-2026.06.05.170000.json.sha256",
              "productDelta": "product-delta-bootstrap-to-2026.06.05.170000.json.sha256"
            },
            "compatibility": {
              "legacyPluginPaths": true,
              "legacyMediaPackage": true,
              "embeddedMediaRequired": false,
              "schemaVersion": "1"
            },
            "generatedAt": "2026-06-05T17:00:00Z"
          }
          EOF
          bash scripts/validate_appstore_catalog_artifact.sh "$tmpdir"

      - name: Smoke test app-store json delta helper
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          cat > "$tmpdir/previous.json" <<'EOF'
          [
            {"key": "mysql", "title": "MySQL"},
            {"key": "redis", "title": "Redis"}
          ]
          EOF
          cat > "$tmpdir/current.json" <<'EOF'
          [
            {"key": "mysql", "title": "MySQL Community"},
            {"key": "nginx", "title": "Nginx"}
          ]
          EOF
          bash scripts/generate_appstore_json_delta.sh \
            --current "$tmpdir/current.json" \
            --previous "$tmpdir/previous.json" \
            --output "$tmpdir/delta.json" \
            --entity product \
            --from-version 2026.06.05.120000 \
            --to-version 2026.06.05.130000 \
            --generated-at 2026-06-05T13:00:00Z
          jq -e '.addedKeys == ["nginx"]' "$tmpdir/delta.json" >/dev/null
          jq -e '.removedKeys == ["redis"]' "$tmpdir/delta.json" >/dev/null
          jq -e '.changedKeys == ["mysql"]' "$tmpdir/delta.json" >/dev/null

      - name: Smoke test library artifact validator
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          mkdir -p "$tmpdir/library/apps/mysql"
          cat > "$tmpdir/library/apps/mysql/variables.json" <<'EOF'
          {
            "edition": [
              {"dist": "community", "version": "8.0"},
              {"dist": "enterprise", "version": "8.4"}
            ]
          }
          EOF
          bash scripts/validate_appstore_library_artifact.sh "$tmpdir/library"

      - name: Smoke test library metadata validator
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          printf 'library payload\n' > "$tmpdir/library-dev.zip"
          sha256sum "$tmpdir/library-dev.zip" | awk '{print $1}' > "$tmpdir/library-dev.zip.sha256"
          cat > "$tmpdir/app-store-install-metadata.json" <<'EOF'
          {
            "initial_apps": [],
            "apps": {
              "mysql": {
                "settings": {},
                "is_web_app": true
              }
            }
          }
          EOF
          sha256sum "$tmpdir/app-store-install-metadata.json" | awk '{print $1}' > "$tmpdir/app-store-install-metadata.json.sha256"
          cat > "$tmpdir/apps-index.json" <<'EOF'
          {
            "schemaVersion": "1",
            "datasetVersion": "2026.06.05.140000",
            "generatedAt": "2026-06-05T14:00:00Z",
            "apps": [
              {"key": "mysql"}
            ]
          }
          EOF
          sha256sum "$tmpdir/apps-index.json" | awk '{print $1}' > "$tmpdir/apps-index.json.sha256"
          cat > "$tmpdir/library-delta-bootstrap-to-2026.06.05.140000.json" <<'EOF'
          {
            "scope": "library",
            "mode": "bootstrap",
            "fromVersion": "bootstrap",
            "toVersion": "2026.06.05.140000",
            "changedApps": ["mysql"],
            "generatedAt": "2026-06-05T14:00:00Z"
          }
          EOF
          sha256sum "$tmpdir/library-delta-bootstrap-to-2026.06.05.140000.json" | awk '{print $1}' > "$tmpdir/library-delta-bootstrap-to-2026.06.05.140000.json.sha256"
          cat > "$tmpdir/apps-delta-bootstrap-to-2026.06.05.140000.json" <<'EOF'
          {
            "scope": "apps",
            "mode": "bootstrap",
            "fromVersion": "bootstrap",
            "toVersion": "2026.06.05.140000",
            "addedApps": ["mysql"],
            "removedApps": [],
            "changedApps": [],
            "generatedAt": "2026-06-05T14:00:00Z"
          }
          EOF
          sha256sum "$tmpdir/apps-delta-bootstrap-to-2026.06.05.140000.json" | awk '{print $1}' > "$tmpdir/apps-delta-bootstrap-to-2026.06.05.140000.json.sha256"
          cat > "$tmpdir/manifest.json" <<'EOF'
          {
