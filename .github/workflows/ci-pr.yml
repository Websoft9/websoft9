  # ── Summary Gate ──
  summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [governance-check, secret-scan, version-consistency, python-ci, console-ci, cli-ci, dockerfile-lint, shellcheck, appstore-artifact-ci]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "=== PR Check Results ==="
          echo "Governance:     ${{ needs.governance-check.result }}"
          echo "Secret Scan:    ${{ needs.secret-scan.result }}"
          echo "Version Check:  ${{ needs.version-consistency.result }}"
          echo "Python CI:      ${{ needs.python-ci.result }}"
          echo "Console CI:     ${{ needs.console-ci.result }}"
          echo "CLI CI:         ${{ needs.cli-ci.result }}"
          echo "Dockerfile Lint:${{ needs.dockerfile-lint.result }}"
          echo "ShellCheck:     ${{ needs.shellcheck.result }}"
          echo "AppStore CI:    ${{ needs.appstore-artifact-ci.result }}"

          FAIL=false
          for job in governance-check secret-scan version-consistency python-ci console-ci cli-ci dockerfile-lint shellcheck appstore-artifact-ci; do
            result="${{ needs[job].result }}"
            if [[ "$result" == "failure" ]] || [[ "$result" == "cancelled" ]]; then
              echo "❌ $job: $result"
              FAIL=true
            elif [[ "$result" == "skipped" ]]; then
              echo "⏭️  $job: $result (no relevant changes)"
            else
              echo "✅ $job: $result"
            fi
          done

          if $FAIL; then
            echo "❌ PR checks failed — fix issues above before merging"
            exit 1
          fi
          echo "✅ All PR checks passed"
