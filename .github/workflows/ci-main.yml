name: Dev Candidate Build

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'media/**'
      - 'logs/**'
      - '.gitignore'
      - 'LICENSE*'

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── Determine dev candidate tags ──
  meta:
    name: Determine Build Meta
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      candidate_tag: ${{ steps.meta.outputs.candidate_tag }}
      version: ${{ steps.meta.outputs.version }}
      edition_key: ${{ steps.meta.outputs.edition_key }}
      alias_tags: ${{ steps.meta.outputs.alias_tags }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          VERSION=$(jq -r '.version' version.json)
          EDITION=$(jq -r '.edition_key' version.json)
          SHA_TAG="sha-${GITHUB_SHA:0:8}"

          CHANNEL=dev
          # Dev publication uses a two-stage model.
          # Stage 1 publishes only the immutable sha-<commit> candidate.
          # Stage 2 promotes moving aliases after scan and smoke-test pass.
          CANDIDATE_TAG="websoft9dev/websoft9:${SHA_TAG}"
          ALIAS_TAGS="websoft9dev/websoft9:dev,websoft9dev/websoft9:${VERSION}-dev"
          TAGS="$CANDIDATE_TAG"

          echo "candidate_tag=$CANDIDATE_TAG" >> $GITHUB_OUTPUT
          echo "alias_tags=$ALIAS_TAGS" >> $GITHUB_OUTPUT

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "edition_key=$EDITION" >> $GITHUB_OUTPUT
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

          echo "✅ Dev candidate | Version: $VERSION | SHA: $SHA_TAG"

  # ── Build, scan, push dev candidate image ──
  build-and-push:
    name: Build & Push Image
    needs: meta
    uses: ./.github/workflows/docker-build.yml
    with:
      push: true
      platforms: linux/amd64
      tags: ${{ needs.meta.outputs.candidate_tag }}
    secrets: inherit

  # ── Smoke test uses SHA tag (guarantees testing the exact build) ──
  smoke-test:
    name: Smoke Test
    needs: [meta, build-and-push]
    uses: ./.github/workflows/smoke-test.yml
    with:
      image: websoft9dev/websoft9:${{ needs.meta.outputs.sha_tag }}

  promote-tags:
    name: Promote Dev Tags
    needs: [meta, build-and-push, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Promote candidate to dev aliases
        run: |
          SOURCE_IMAGE="${{ needs.meta.outputs.candidate_tag }}"
          IFS=',' read -ra TARGETS <<< "${{ needs.meta.outputs.alias_tags }}"
          for target in "${TARGETS[@]}"; do
            echo "Promoting $SOURCE_IMAGE -> $target"
            docker buildx imagetools create -t "$target" "$SOURCE_IMAGE"
          done

  # ── Publish dev artifacts to R2 without creating a formal release ──
  upload-artifacts:
    name: Upload Dev Artifacts
    needs: [meta, promote-tags, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create dev distribution bundles
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          EDITION_KEY="${{ needs.meta.outputs.edition_key }}"
          CHANNEL="${{ needs.meta.outputs.channel }}"
          SHA_TAG="${{ needs.meta.outputs.sha_tag }}"
          CANDIDATE_TAG="${{ needs.meta.outputs.candidate_tag }}"
          ALIAS_TAGS="${{ needs.meta.outputs.alias_tags }}"
          GENERATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          mkdir -p release-assets r2-artifacts websoft9

          cp -r docker websoft9/
          cp -r scripts websoft9/
          cp -r install websoft9/
          cp version.json websoft9/
          cp CHANGELOG.md websoft9/
          cp mirrors.json websoft9/

          zip -r "websoft9-${VERSION}-${SHA_TAG}.zip" websoft9
          cp "websoft9-${VERSION}-${SHA_TAG}.zip" release-assets/
          cp "release-assets/websoft9-${VERSION}-${SHA_TAG}.zip" release-assets/websoft9-dev.zip
          cp install/install.sh r2-artifacts/install.sh
          cp install/uninstall.sh r2-artifacts/uninstall.sh
          cp docker/docker-compose.yml r2-artifacts/docker-compose.yml
          cp version.json r2-artifacts/version.json
          cp CHANGELOG.md r2-artifacts/CHANGELOG.md
          cp mirrors.json r2-artifacts/mirrors.json
          cp version.json release-assets/version.json
          cp CHANGELOG.md release-assets/CHANGELOG.md
          cp mirrors.json release-assets/mirrors.json

          jq -n \
            --arg schema_version "1" \
            --arg product "websoft9" \
            --arg channel "$CHANNEL" \
            --arg version "$VERSION" \
            --arg edition_key "$EDITION_KEY" \
            --arg git_sha "$GITHUB_SHA" \
            --arg generated_at "$GENERATED_AT" \
            --arg repository "websoft9dev/websoft9" \
            --arg candidate_tag "$CANDIDATE_TAG" \
            --arg alias_tags "$ALIAS_TAGS" \
            '{
              schema_version: ($schema_version | tonumber),
              product: $product,
              channel: $channel,
              version: $version,
              edition_key: $edition_key,
              git_sha: $git_sha,
              generated_at: $generated_at,
              image: {
                repository: $repository,
                candidate_tag: $candidate_tag,
                alias_tags: ($alias_tags | split(","))
              }
            }' > manifest.json

          cp manifest.json r2-artifacts/manifest.json
          cp manifest.json release-assets/manifest.json

          (
            cd r2-artifacts
            sha256sum \
              install.sh \
              uninstall.sh \
              docker-compose.yml \
              version.json \
              CHANGELOG.md \
              mirrors.json \
              manifest.json > SHA256SUMS
          )

          (
            cd release-assets
            sha256sum \
              "websoft9-${VERSION}-${SHA_TAG}.zip" \
              websoft9-dev.zip \
              version.json \
              CHANGELOG.md \
              mirrors.json \
              manifest.json > SHA256SUMS
          )

          echo "✅ Dev candidate bundles created: websoft9-${VERSION}-${SHA_TAG}.zip"

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_SECRET_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          r2-bucket: artifact
          source-dir: r2-artifacts
          destination-dir: ./websoft9/${{ needs.meta.outputs.channel }}

      - name: Purge Cloudflare Cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PURGE_URLS: >-
            ["https://artifact.websoft9.com/websoft9/${{ needs.meta.outputs.channel }}/install.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.meta.outputs.channel }}/uninstall.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.meta.outputs.channel }}/docker-compose.yml",
            "https://artifact.websoft9.com/websoft9/${{ needs.meta.outputs.channel }}/manifest.json",
            "https://artifact.websoft9.com/websoft9/${{ needs.meta.outputs.channel }}/SHA256SUMS"]

      - name: Publish Dev GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-artifacts
          target_commitish: dev
          name: Dev Artifacts
          prerelease: true
          draft: false
          generate_release_notes: false
          make_latest: false
          files: |
            release-assets/websoft9-${{ needs.meta.outputs.version }}-${{ needs.meta.outputs.sha_tag }}.zip
            release-assets/websoft9-dev.zip
            release-assets/manifest.json
            release-assets/SHA256SUMS
            release-assets/version.json
            release-assets/CHANGELOG.md

  # ── Docker Hub description is maintained by the release workflow ──
  dockerhub-description:
    name: Update DockerHub README
    runs-on: ubuntu-latest
    needs: promote-tags
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: websoft9dev/websoft9
          readme-filepath: docker/README.md
