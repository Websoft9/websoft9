name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        type: choice
        description: Release channel
        options:
          - auto
          - release
          - rc
          - dev
        default: auto
  push:
    branches:
      - main
      - dev
      - 'hotfix*'
    paths:
      - version.json

jobs:
  # ── Determine release channel and metadata ──
  determine-channel:
    name: Determine Channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      version: ${{ steps.channel.outputs.version }}
      version_core: ${{ steps.channel.outputs.version_core }}
      is-release: ${{ steps.channel.outputs.is_release }}
      is-hotfix: ${{ steps.channel.outputs.is_hotfix }}
    steps:
      - uses: actions/checkout@v4
      - id: channel
        run: |
          VERSION=$(jq -r '.version' version.json)
          VERSION_CORE="${VERSION%%-*}"
          BRANCH="${{ github.ref_name }}"
          MANUAL_CHANNEL="${{ github.event.inputs.channel }}"

          # Determine channel
          if [[ "$MANUAL_CHANNEL" != "" ]] && [[ "$MANUAL_CHANNEL" != "auto" ]]; then
            CHANNEL="$MANUAL_CHANNEL"
          elif [[ "$BRANCH" == "dev" ]]; then
            CHANNEL=dev
          elif [[ "$BRANCH" == hotfix* ]] || [[ "$VERSION" == *-* ]]; then
            CHANNEL=rc
          else
            CHANNEL=release
          fi

          IS_RELEASE=false
          [[ "$CHANNEL" == "release" ]] && IS_RELEASE=true

          IS_HOTFIX=false
          [[ "$BRANCH" == hotfix* ]] && IS_HOTFIX=true

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_core=$VERSION_CORE" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "is_hotfix=$IS_HOTFIX" >> $GITHUB_OUTPUT

          echo "✅ Channel: $CHANNEL | Version: $VERSION | Branch: $BRANCH"

  build-appstore-dataset:
    name: Build Appstore Dataset
    needs: determine-channel
    uses: ./.github/workflows/build-appstore-catalog.yml
    with:
      channel: ${{ needs.determine-channel.outputs.channel }}
    secrets: inherit

  # ── Create hotfix branch from main (release only) ──
  create-hotfix-branch:
    name: Create Hotfix Branch
    needs: determine-channel
    if: |
      needs.determine-channel.outputs.is-release == 'true' &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push hotfix branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH="hotfix-$TIMESTAMP"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "✅ Created hotfix branch: $BRANCH"

  # ── Update CHANGELOG ──
  update-changelog:
    name: Update CHANGELOG
    needs: determine-channel
    runs-on: ubuntu-latest
    outputs:
      changelog_body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
      - id: changelog
        run: |
          CHANGELOG_CONTENT=$(cat changelog_latest.md 2>/dev/null || echo "No changelog entry")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          CURRENT_DATE=$(date +%Y-%m-%d)
          printf "## ${{ needs.determine-channel.outputs.version }} release on $CURRENT_DATE\n$CHANGELOG_CONTENT\n$(cat CHANGELOG.md)" > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md
          echo "✅ CHANGELOG.md updated"

  # ── Create release archive and upload to Cloudflare R2 ──
  upload-artifacts:
    name: Upload Artifacts
    needs: [determine-channel, update-changelog, build-appstore-dataset]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release archive
        run: |
          VERSION_CORE="${{ needs.determine-channel.outputs.version_core }}"

          mkdir -p artifacts websoft9

          # Include only what's needed for single-container deployment
          cp -r docker websoft9/
          cp -r scripts websoft9/
          cp -r install websoft9/
          cp version.json websoft9/
          cp CHANGELOG.md websoft9/
          cp mirrors.json websoft9/

          # Create versioned zip
          zip -r "websoft9-${VERSION_CORE}.zip" websoft9
          cp "websoft9-${VERSION_CORE}.zip" artifacts/
          cp install/install.sh artifacts/
          cp install/uninstall.sh artifacts/
          cp docker/docker-compose.yml artifacts/
          cp version.json artifacts/
          cp CHANGELOG.md artifacts/
          cp mirrors.json artifacts/

          # Also create latest symlink
          cp "artifacts/websoft9-${VERSION_CORE}.zip" artifacts/websoft9-latest.zip

          echo "✅ Archive created: websoft9-${VERSION_CORE}.zip"

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_SECRET_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          r2-bucket: artifact
          source-dir: artifacts
          destination-dir: ./${{ needs.determine-channel.outputs.channel }}/websoft9

      - name: Purge Cloudflare Cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PURGE_URLS: '["https://artifact.websoft9.com/${{ needs.determine-channel.outputs.channel }}/websoft9/websoft9-latest.zip"]'

  # ── Create GitHub Release (release or hotfix channels) ──
  github-release:
    name: GitHub Release
    needs: [determine-channel, update-changelog, build-appstore-dataset]
    if: |
      needs.determine-channel.outputs.is_release == 'true' ||
      needs.determine-channel.outputs.is_hotfix == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            version.json
            CHANGELOG.md
          tag_name: ${{ needs.determine-channel.outputs.version }}
          name: ${{ needs.determine-channel.outputs.version }}
          body: ${{ needs.update-changelog.outputs.changelog_body }}
          draft: false
          prerelease: ${{ needs.determine-channel.outputs.is_release == 'false' }}

  # ── Deploy GitHub Pages (release channel only) ──
  pages:
    name: GitHub Pages
    needs: [determine-channel, build-appstore-dataset]
    if: |
      needs.determine-channel.outputs.is_release == 'true' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── WeChat work notification ──
  notify:
    name: WeChat Notification
    needs: [determine-channel, update-changelog]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send WeChat webhook
        run: |
          VERSION="${{ needs.determine-channel.outputs.version }}"
          CHANNEL="${{ needs.determine-channel.outputs.channel }}"
          CHANGELOG=$(cat changelog_latest.md 2>/dev/null | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g' || echo "No changelog")

          if [[ "$CHANNEL" == "rc" ]]; then
            VERSION_DISPLAY="${VERSION}（预发布）"
          else
            VERSION_DISPLAY="$VERSION"
          fi

          curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WIXIN_ROBOT_KEY }}' \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"【Release 通知】\\n> 项目名称：<font color=\\\"info\\\">websoft9</font>\\n> 发布通道：<font color=\\\"comment\\\">${CHANNEL}</font>\\n> 最新版本：<font color=\\\"comment\\\">${VERSION_DISPLAY}</font>\\n> 更新内容：\\n${CHANGELOG}\\n>\"
              }
            }"
