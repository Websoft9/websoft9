name: Main Release Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - version.json

jobs:
  # ── Determine release metadata ──
  determine-channel:
    name: Determine Release Meta
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      version: ${{ steps.channel.outputs.version }}
      version_core: ${{ steps.channel.outputs.version_core }}
      sha_tag: ${{ steps.channel.outputs.sha_tag }}
      is_prerelease: ${{ steps.channel.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: channel
        run: |
          VERSION=$(jq -r '.version' version.json)
          VERSION_CORE="${VERSION%%-*}"
          SHA_TAG="sha-${GITHUB_SHA:0:8}"
          CHANNEL=release
          IS_PRERELEASE=false
          if [[ "$VERSION" == *-rc* ]]; then
            IS_PRERELEASE=true
          fi

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_core=$VERSION_CORE" >> $GITHUB_OUTPUT
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          echo "✅ Release | Version: $VERSION | SHA: $SHA_TAG | Pre-release: $IS_PRERELEASE"

  image-meta:
    name: Determine Image Tags
    needs: determine-channel
    runs-on: ubuntu-latest
    outputs:
      candidate_tag: ${{ steps.meta.outputs.candidate_tag }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      alias_tags: ${{ steps.meta.outputs.alias_tags }}
      tags: ${{ steps.meta.outputs.tags }}
      smoke_image: ${{ steps.meta.outputs.smoke_image }}
    steps:
      - id: meta
        run: |
          VERSION="${{ needs.determine-channel.outputs.version }}"
          VERSION_CORE="${{ needs.determine-channel.outputs.version_core }}"
          SHA_TAG="${{ needs.determine-channel.outputs.sha_tag }}"
          IS_PRERELEASE="${{ needs.determine-channel.outputs.is_prerelease }}"

          # Release publication uses a two-stage model.
          # Stage 1 publishes the immutable sha-<commit> candidate plus the explicit version tag.
          # Stage 2 promotes stable and compatibility aliases only for final releases.
          CANDIDATE_TAG="websoft9dev/websoft9:${SHA_TAG}"
          VERSION_TAG="websoft9dev/websoft9:${VERSION}"
          ALIAS_TAGS=""
          if [[ "$IS_PRERELEASE" != "true" ]]; then
            ALIAS_TAGS="websoft9dev/websoft9:latest,${VERSION_TAG}"
            IFS='.' read -ra PARTS <<< "$VERSION_CORE"
            if [[ ${#PARTS[@]} -ge 2 ]]; then
              ALIAS_TAGS="${ALIAS_TAGS},websoft9dev/websoft9:${PARTS[0]}"
              ALIAS_TAGS="${ALIAS_TAGS},websoft9dev/websoft9:${PARTS[0]}.${PARTS[1]}"
            fi
            if [[ ${#PARTS[@]} -ge 3 ]]; then
              ALIAS_TAGS="${ALIAS_TAGS},websoft9dev/websoft9:${PARTS[0]}.${PARTS[1]}.${PARTS[2]}"
            fi
          fi

          echo "candidate_tag=$CANDIDATE_TAG" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "alias_tags=$ALIAS_TAGS" >> $GITHUB_OUTPUT
          echo "tags=$CANDIDATE_TAG,$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "smoke_image=websoft9dev/websoft9:${SHA_TAG}" >> $GITHUB_OUTPUT

  build-and-push-image:
    name: Build & Push Image
    needs: [determine-channel, image-meta]
    uses: ./.github/workflows/docker-build.yml
    with:
      push: true
      platforms: linux/amd64
      tags: ${{ needs.image-meta.outputs.tags }}
    secrets: inherit

  smoke-test-image:
    name: Smoke Test Image
    needs: [image-meta, build-and-push-image]
    uses: ./.github/workflows/smoke-test.yml
    with:
      image: ${{ needs.image-meta.outputs.smoke_image }}

  promote-release-tags:
    name: Promote Release Tags
    needs: [image-meta, build-and-push-image, smoke-test-image]
    if: needs.determine-channel.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Promote candidate to release aliases
        run: |
          SOURCE_IMAGE="${{ needs.image-meta.outputs.candidate_tag }}"
          IFS=',' read -ra TARGETS <<< "${{ needs.image-meta.outputs.alias_tags }}"
          for target in "${TARGETS[@]}"; do
            echo "Promoting $SOURCE_IMAGE -> $target"
            docker buildx imagetools create -t "$target" "$SOURCE_IMAGE"
          done

  # ── Extract release notes from CHANGELOG ──
  release-notes:
    name: Resolve Release Notes
    needs: determine-channel
    runs-on: ubuntu-latest
    outputs:
      changelog_body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
      - id: changelog
        run: |
          VERSION="${{ needs.determine-channel.outputs.version }}"
          CHANGELOG_CONTENT=$(python3 - "$VERSION" <<'PY'
import re
import sys
from pathlib import Path

version = sys.argv[1]
          pattern = re.compile(rf"^##\s+\[{re.escape(version)}\](?:\s+-\s+.+)?$")
lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
captured = []
capture = False

for line in lines:
    if line.startswith("## "):
        if capture:
            break
        if pattern.match(line):
            capture = True
    if capture:
        captured.append(line)

print("\n".join(captured))
PY
          )

          if [[ -z "$CHANGELOG_CONTENT" ]]; then
            echo "::error::CHANGELOG.md is missing a release section for version $VERSION"
            exit 1
          fi

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "✅ Release notes resolved from CHANGELOG.md"

  # ── Create release distribution bundles and upload install surface to R2 ──
  upload-artifacts:
    name: Upload Artifacts
    needs: [determine-channel, image-meta, release-notes, promote-release-tags, smoke-test-image]
    if: |
      always() &&
      !cancelled() &&
      needs.smoke-test-image.result == 'success' &&
      (needs.determine-channel.outputs.is_prerelease == 'true' || needs.promote-release-tags.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release distribution bundles
        run: |
          VERSION_CORE="${{ needs.determine-channel.outputs.version_core }}"
          VERSION="${{ needs.determine-channel.outputs.version }}"
          SHA_TAG="${{ needs.determine-channel.outputs.sha_tag }}"
          GENERATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EDITION_KEY=$(jq -r '.edition_key' version.json)
          CANDIDATE_TAG="${{ needs.image-meta.outputs.candidate_tag }}"
          VERSION_TAG="${{ needs.image-meta.outputs.version_tag }}"
          ALIAS_TAGS="${{ needs.image-meta.outputs.alias_tags }}"
          IS_PRERELEASE="${{ needs.determine-channel.outputs.is_prerelease }}"

          mkdir -p release-assets r2-artifacts websoft9

          # Include only what's needed for single-container deployment
          cp -r docker websoft9/
          cp -r scripts websoft9/
          cp -r install websoft9/
          cp version.json websoft9/
          cp CHANGELOG.md websoft9/
          cp mirrors.json websoft9/
          bash scripts/prepare_platform_artifact.sh \
            --channel release \
            --bundle-docker-dir websoft9/docker \
            --artifact-dir r2-artifacts

          BUNDLE_FILE="websoft9-${VERSION}.zip"
          ALIAS_BUNDLE_FILE=""
          if [[ "$IS_PRERELEASE" != "true" ]]; then
            BUNDLE_FILE="websoft9-${VERSION_CORE}.zip"
            ALIAS_BUNDLE_FILE="websoft9-latest.zip"
          fi

          zip -r "$BUNDLE_FILE" websoft9
          cp "$BUNDLE_FILE" release-assets/
          mkdir -p legacy-r2-artifacts
          bash install/build-bundle.sh install/dist
          cp install/dist/install.sh r2-artifacts/install.sh
          cp install/dist/uninstall.sh r2-artifacts/uninstall.sh
          cp install/install_docker.sh r2-artifacts/install_docker.sh
          cp install/dist/install.sh legacy-r2-artifacts/install.sh
          cp install/dist/uninstall.sh legacy-r2-artifacts/uninstall.sh
          cp install/install_docker.sh legacy-r2-artifacts/install_docker.sh
          cp version.json r2-artifacts/version.json
          cp CHANGELOG.md r2-artifacts/CHANGELOG.md
          cp mirrors.json r2-artifacts/mirrors.json
          cp version.json release-assets/version.json
          cp CHANGELOG.md release-assets/CHANGELOG.md
          cp mirrors.json release-assets/mirrors.json

          # Provide a moving alias for the latest stable bundle only for final releases.
          if [[ "$IS_PRERELEASE" != "true" ]]; then
            cp "release-assets/${BUNDLE_FILE}" "release-assets/${ALIAS_BUNDLE_FILE}"
          fi

          jq -n \
            --arg schema_version "1" \
            --arg product "websoft9" \
            --arg channel "release" \
            --arg version "$VERSION" \
            --arg version_core "$VERSION_CORE" \
            --arg edition_key "$EDITION_KEY" \
            --arg git_sha "$GITHUB_SHA" \
            --arg generated_at "$GENERATED_AT" \
            --arg repository "websoft9dev/websoft9" \
            --arg default_tag "$([ "$IS_PRERELEASE" = "true" ] && printf '%s' "$VERSION" || printf 'latest')" \
            --arg version_tag "$VERSION" \
            --arg candidate_tag "$CANDIDATE_TAG" \
            --arg alias_tags "$ALIAS_TAGS" \
            --arg bundle_file "$BUNDLE_FILE" \
            --arg alias_bundle_file "$ALIAS_BUNDLE_FILE" \
            '{
              schema_version: ($schema_version | tonumber),
              product: $product,
              channel: $channel,
              version: $version,
              version_core: $version_core,
              edition_key: $edition_key,
              git_sha: $git_sha,
              generated_at: $generated_at,
              install: {
                compose_file: "docker-compose.yml",
                install_script: "install.sh",
                uninstall_script: "uninstall.sh",
                docker_install_script: "install_docker.sh",
                changelog_file: "CHANGELOG.md",
                version_file: "version.json",
                mirrors_file: "mirrors.json",
                checksum_file: "SHA256SUMS"
              },
              image: {
                repository: $repository,
                default_tag: $default_tag,
                version_tag: $version_tag,
                candidate_tag: $candidate_tag,
                alias_tags: ($alias_tags | split(","))
              },
              distribution: {
                bundle_file: $bundle_file,
                alias_bundle_file: $alias_bundle_file
              }
            }' > manifest.json

          cp manifest.json r2-artifacts/manifest.json
          cp manifest.json release-assets/manifest.json

          grep '^OPT_CHANNEL="release"' install/dist/install.sh
          jq -e '.channel == "release" and .install.compose_file == "docker-compose.yml"' manifest.json >/dev/null

          (
            cd r2-artifacts
            sha256sum \
              install.sh \
              uninstall.sh \
              install_docker.sh \
              docker-compose.yml \
              version.json \
              CHANGELOG.md \
              mirrors.json \
              manifest.json > SHA256SUMS
          )

          (
            cd release-assets
            if [[ "$IS_PRERELEASE" = "true" ]]; then
              sha256sum \
                "$BUNDLE_FILE" \
                version.json \
                CHANGELOG.md \
                mirrors.json \
                manifest.json > SHA256SUMS
            else
              sha256sum \
                "$BUNDLE_FILE" \
                "$ALIAS_BUNDLE_FILE" \
                version.json \
                CHANGELOG.md \
                mirrors.json \
                manifest.json > SHA256SUMS
            fi
          )

          echo "✅ Release bundles created: ${BUNDLE_FILE}"

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_SECRET_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          r2-bucket: artifact
          source-dir: r2-artifacts
          destination-dir: ./websoft9/${{ needs.determine-channel.outputs.channel }}

      - name: Upload legacy compatibility alias to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_SECRET_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          r2-bucket: artifact
          source-dir: legacy-r2-artifacts
          destination-dir: ./release/websoft9

      - name: Purge Cloudflare Cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PURGE_URLS: >-
            ["https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/install.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/uninstall.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/install_docker.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/docker-compose.yml",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/manifest.json",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/SHA256SUMS",
            "https://artifact.websoft9.com/release/websoft9/install.sh",
            "https://artifact.websoft9.com/release/websoft9/uninstall.sh",
            "https://artifact.websoft9.com/release/websoft9/install_docker.sh"]'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/websoft9-${{ needs.determine-channel.outputs.version }}.zip
            release-assets/manifest.json
            release-assets/SHA256SUMS
            release-assets/version.json
            release-assets/CHANGELOG.md
          tag_name: ${{ needs.determine-channel.outputs.version }}
          name: ${{ needs.determine-channel.outputs.version }}
          body: ${{ needs.release-notes.outputs.changelog_body }}
          draft: false
          prerelease: ${{ needs.determine-channel.outputs.is_prerelease == 'true' }}

  # ── Deploy GitHub Pages ──
  pages:
    name: GitHub Pages
    needs: determine-channel
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── WeChat work notification ──
  notify:
    name: WeChat Notification
    needs: [determine-channel, release-notes]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send WeChat webhook
        run: |
          VERSION="${{ needs.determine-channel.outputs.version }}"
          CHANNEL="${{ needs.determine-channel.outputs.channel }}"
          CHANGELOG=$(printf '%s' '${{ needs.release-notes.outputs.changelog_body }}' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')

          curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WIXIN_ROBOT_KEY }}' \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"【Release 通知】\\n> 项目名称：<font color=\\\"info\\\">websoft9</font>\\n> 发布通道：<font color=\\\"comment\\\">${CHANNEL}</font>\\n> 最新版本：<font color=\\\"comment\\\">${VERSION}</font>\\n> 更新内容：\\n${CHANGELOG}\\n>\"
              }
            }"
