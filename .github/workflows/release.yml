name: Main Release Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - version.json

jobs:
  # ── Determine release metadata ──
  determine-channel:
    name: Determine Release Meta
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      version: ${{ steps.channel.outputs.version }}
      version_core: ${{ steps.channel.outputs.version_core }}
      sha_tag: ${{ steps.channel.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: channel
        run: |
          VERSION=$(jq -r '.version' version.json)
          VERSION_CORE="${VERSION%%-*}"
          SHA_TAG="sha-${GITHUB_SHA:0:8}"
          CHANNEL=release

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_core=$VERSION_CORE" >> $GITHUB_OUTPUT
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT

          echo "✅ Release | Version: $VERSION | SHA: $SHA_TAG"

  image-meta:
    name: Determine Image Tags
    needs: determine-channel
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      smoke_image: ${{ steps.meta.outputs.smoke_image }}
    steps:
      - id: meta
        run: |
          VERSION="${{ needs.determine-channel.outputs.version }}"
          VERSION_CORE="${{ needs.determine-channel.outputs.version_core }}"
          SHA_TAG="${{ needs.determine-channel.outputs.sha_tag }}"

          # Release tags intentionally keep immutable identifiers separate from moving aliases.
          # - sha-<commit> and <version>: immutable references for audit and rollback
          # - <major>.<minor>, <major>, latest: moving aliases for compatibility lines
          TAGS="websoft9dev/websoft9:${SHA_TAG}"
          TAGS="${TAGS},websoft9dev/websoft9:latest"
          TAGS="${TAGS},websoft9dev/websoft9:${VERSION}"
          IFS='.' read -ra PARTS <<< "$VERSION_CORE"
          if [[ ${#PARTS[@]} -ge 2 ]]; then
            TAGS="${TAGS},websoft9dev/websoft9:${PARTS[0]}"
            TAGS="${TAGS},websoft9dev/websoft9:${PARTS[0]}.${PARTS[1]}"
          fi
          if [[ ${#PARTS[@]} -ge 3 ]]; then
            TAGS="${TAGS},websoft9dev/websoft9:${PARTS[0]}.${PARTS[1]}.${PARTS[2]}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "smoke_image=websoft9dev/websoft9:${SHA_TAG}" >> $GITHUB_OUTPUT

  build-and-push-image:
    name: Build & Push Image
    needs: [determine-channel, image-meta]
    uses: ./.github/workflows/docker-build.yml
    with:
      push: true
      platforms: linux/amd64
      tags: ${{ needs.image-meta.outputs.tags }}
    secrets: inherit

  smoke-test-image:
    name: Smoke Test Image
    needs: [image-meta, build-and-push-image]
    uses: ./.github/workflows/smoke-test.yml
    with:
      image: ${{ needs.image-meta.outputs.smoke_image }}

  # ── Update CHANGELOG ──
  update-changelog:
    name: Update CHANGELOG
    needs: determine-channel
    runs-on: ubuntu-latest
    outputs:
      changelog_body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
      - id: changelog
        run: |
          CHANGELOG_CONTENT=$(cat changelog_latest.md 2>/dev/null || echo "No changelog entry")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          CURRENT_DATE=$(date +%Y-%m-%d)
          printf "## ${{ needs.determine-channel.outputs.version }} release on $CURRENT_DATE\n$CHANGELOG_CONTENT\n$(cat CHANGELOG.md)" > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md
          echo "✅ CHANGELOG.md updated"

  # ── Create release archive and upload to Cloudflare R2 ──
  upload-artifacts:
    name: Upload Artifacts
    needs: [determine-channel, update-changelog, build-and-push-image, smoke-test-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release archive
        run: |
          VERSION_CORE="${{ needs.determine-channel.outputs.version_core }}"
          VERSION="${{ needs.determine-channel.outputs.version }}"
          CHANNEL="${{ needs.determine-channel.outputs.channel }}"

          mkdir -p artifacts websoft9

          # Include only what's needed for single-container deployment
          cp -r docker websoft9/
          cp -r scripts websoft9/
          cp -r install websoft9/
          cp version.json websoft9/
          cp CHANGELOG.md websoft9/
          cp mirrors.json websoft9/

          # Create versioned zip
          zip -r "websoft9-${VERSION_CORE}.zip" websoft9
          cp "websoft9-${VERSION_CORE}.zip" artifacts/
          cp install/install.sh artifacts/install.sh
          cp install/uninstall.sh artifacts/uninstall.sh
          cp docker/docker-compose.yml artifacts/docker-compose.yml
          cp version.json artifacts/version.json
          cp CHANGELOG.md artifacts/CHANGELOG.md
          cp mirrors.json artifacts/mirrors.json

          # Stable and versioned aliases inside the new platform publish root
          cp artifacts/install.sh "artifacts/install-${CHANNEL}.sh"
          cp artifacts/uninstall.sh "artifacts/uninstall-${CHANNEL}.sh"
          cp artifacts/docker-compose.yml "artifacts/docker-compose-${CHANNEL}.yml"
          cp artifacts/install.sh "artifacts/install-${VERSION}.sh"
          cp artifacts/uninstall.sh "artifacts/uninstall-${VERSION}.sh"
          cp artifacts/docker-compose.yml "artifacts/docker-compose-${VERSION}.yml"

          # Also create latest symlink
          cp "artifacts/websoft9-${VERSION_CORE}.zip" artifacts/websoft9-latest.zip

          echo "✅ Archive created: websoft9-${VERSION_CORE}.zip"

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_SECRET_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          r2-bucket: artifact
          source-dir: artifacts
          destination-dir: ./websoft9/${{ needs.determine-channel.outputs.channel }}/platform

      - name: Purge Cloudflare Cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PURGE_URLS: >-
            ["https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/websoft9-latest.zip",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/websoft9-${{ needs.determine-channel.outputs.version_core }}.zip",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/install.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/uninstall.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/docker-compose.yml",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/install-${{ needs.determine-channel.outputs.channel }}.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/uninstall-${{ needs.determine-channel.outputs.channel }}.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/docker-compose-${{ needs.determine-channel.outputs.channel }}.yml",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/install-${{ needs.determine-channel.outputs.version }}.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/uninstall-${{ needs.determine-channel.outputs.version }}.sh",
            "https://artifact.websoft9.com/websoft9/${{ needs.determine-channel.outputs.channel }}/platform/docker-compose-${{ needs.determine-channel.outputs.version }}.yml"]'

  # ── Create GitHub Release ──
  github-release:
    name: GitHub Release
    needs: [determine-channel, update-changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            version.json
            CHANGELOG.md
          tag_name: ${{ needs.determine-channel.outputs.version }}
          name: ${{ needs.determine-channel.outputs.version }}
          body: ${{ needs.update-changelog.outputs.changelog_body }}
          draft: false
          prerelease: false

  # ── Deploy GitHub Pages ──
  pages:
    name: GitHub Pages
    needs: determine-channel
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── WeChat work notification ──
  notify:
    name: WeChat Notification
    needs: [determine-channel, update-changelog]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send WeChat webhook
        run: |
          VERSION="${{ needs.determine-channel.outputs.version }}"
          CHANNEL="${{ needs.determine-channel.outputs.channel }}"
          CHANGELOG=$(cat changelog_latest.md 2>/dev/null | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g' || echo "No changelog")

          curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WIXIN_ROBOT_KEY }}' \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"【Release 通知】\\n> 项目名称：<font color=\\\"info\\\">websoft9</font>\\n> 发布通道：<font color=\\\"comment\\\">${CHANNEL}</font>\\n> 最新版本：<font color=\\\"comment\\\">${VERSION}</font>\\n> 更新内容：\\n${CHANGELOG}\\n>\"
              }
            }"
